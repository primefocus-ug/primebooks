{% load i18n %}
<!-- Document Type Selection -->
<div class="card mb-3">
    <div class="card-body">
        <h6 class="card-title mb-3">
            <i class="bi bi-file-text me-2"></i>{% trans "Document Type" %}
        </h6>
        <div class="row g-2">
            <div class="col-8">
                <div class="btn-group w-100" role="group">
                    <input type="radio" class="btn-check" name="document_type"
                           id="docReceipt" value="RECEIPT" checked>
                    <label class="btn btn-outline-primary" for="docReceipt">
                        <i class="bi bi-receipt me-1"></i>{% trans "Receipt" %}
                    </label>

                    <input type="radio" class="btn-check" name="document_type"
                           id="docInvoice" value="INVOICE">
                    <label class="btn btn-outline-primary" for="docInvoice">
                        <i class="bi bi-file-earmark-text me-1"></i>{% trans "Invoice" %}
                    </label>
                </div>
            </div>
            <div class="col-4">
                <button type="button" class="btn btn-info w-100 btn-with-shortcut"
                        onclick="showDraftsModal()" id="manageDraftsBtn"
                        data-keyboard-hint="F9">
                    <i class="bi bi-files me-1"></i>Drafts
                    <span class="badge bg-light text-dark ms-1" id="draftsBadge" style="display: none;">0</span>
                    <span class="shortcut-hint">F9</span>
                </button>
            </div>
        </div>

        <!-- Due Date Section -->
        <div class="card mt-3" id="dueDateSection" style="display: none;">
            <div class="card-body">
                <h6 class="card-title mb-3">
                    <i class="bi bi-calendar me-2"></i>{% trans "Due Date" %}
                </h6>
                <input type="date" name="due_date" id="dueDate" class="form-control"
                       min="{{ today|date:'Y-m-d' }}">
                <small class="text-muted">
                    {% trans "Due date is required for invoices. Default is 30 days from today." %}
                </small>
            </div>
        </div>

        <!-- EFRIS Requirements (if enabled) -->
        {% if company.efris_enabled %}
        <div class="efris-requirements mt-3" id="efrisRequirements" style="display: none;">
            <h6><i class="bi bi-shield-check me-2"></i>{% trans "EFRIS Requirements" %}</h6>
            <ul class="mb-0" id="efrisRequirementsList">
                <!-- Content will be populated by JavaScript -->
            </ul>
        </div>
        {% endif %}
    </div>
</div>
