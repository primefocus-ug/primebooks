{% load i18n %}

<!-- Keyboard Tutorial Overlay -->
<div class="keyboard-tutorial-overlay" id="keyboardTutorial">
    <div class="keyboard-tutorial-content">
        <h2>⌨️ Welcome to Keyboard Navigation!</h2>
        <p style="font-size: 18px; margin-bottom: 30px;">
            Control everything without touching your mouse
        </p>

        <div class="keyboard-tutorial-grid">
            <div class="keyboard-tutorial-item">
                <kbd>F1</kbd>
                <p>Search Products</p>
            </div>
            <div class="keyboard-tutorial-item">
                <kbd>F2</kbd>
                <p>Search Customers</p>
            </div>
            <div class="keyboard-tutorial-item">
                <kbd>F3</kbd>
                <p>Complete Sale</p>
            </div>
            <div class="keyboard-tutorial-item">
                <kbd>1-9</kbd>
                <p>Quick Add Items</p>
            </div>
            <div class="keyboard-tutorial-item">
                <kbd>↑↓←→</kbd>
                <p>Navigate Lists</p>
            </div>
            <div class="keyboard-tutorial-item">
                <kbd>?</kbd>
                <p>Show All Shortcuts</p>
            </div>
        </div>

        <div style="margin-top: 30px;">
            <button class="btn btn-lg"
                    style="background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 600;"
                    onclick="closeKeyboardTutorial()">
                Got it! Let's start
            </button>
        </div>

        <p style="font-size: 12px; margin-top: 20px; opacity: 0.7;">
            Press <kbd style="font-size: 11px; padding: 3px 8px;">Esc</kbd> anytime to cancel actions
        </p>
    </div>
</div>

<style>
.keyboard-tutorial-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    z-index: 10002;
    display: none;
    align-items: center;
    justify-content: center;
    color: white;
    padding: 40px;
}

.keyboard-tutorial-overlay.show {
    display: flex;
}

.keyboard-tutorial-content {
    max-width: 800px;
    text-align: center;
}

.keyboard-tutorial-content h2 {
    font-size: 32px;
    margin-bottom: 20px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.keyboard-tutorial-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-top: 30px;
}

.keyboard-tutorial-item {
    background: rgba(255, 255, 255, 0.1);
    padding: 20px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
}

.keyboard-tutorial-item kbd {
    background: linear-gradient(135deg, #667eea, #764ba2);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 14px;
    display: inline-block;
    margin-bottom: 10px;
}
</style>

<script>
function closeKeyboardTutorial() {
    const tutorial = document.getElementById('keyboardTutorial');
    if (tutorial) {
        tutorial.classList.remove('show');
        localStorage.setItem('keyboardTutorialCompleted', 'true');
    }
}

// Show tutorial on first visit
document.addEventListener('DOMContentLoaded', function() {
    if (!localStorage.getItem('keyboardTutorialCompleted')) {
        setTimeout(() => {
            const tutorial = document.getElementById('keyboardTutorial');
            if (tutorial) tutorial.classList.add('show');
        }, 1000);
    }
});
</script>
