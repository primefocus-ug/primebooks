{% load i18n %}
<!-- Store Selection -->
<div class="card mb-3">
    <div class="card-body">
        <h6 class="card-title mb-3">
            <i class="bi bi-shop me-2"></i>{% trans "Branch Selection" %}
        </h6>
        <select name="store" id="storeSelect" class="form-select" required
                onchange="validateStoreSelection()">
            <option value="">{% trans "-- Select Branch --" %}</option>
            {% for store in stores %}
            <option value="{{ store.id }}"
                    {% if default_store and store.id == default_store.id %}selected{% endif %}
                    data-code="{{ store.code }}"
                    data-location="{{ store.location }}"
                    data-phone="{{ store.phone|default:'' }}"
                    data-email="{{ store.email|default:'' }}"
                    data-tin="{{ store.tin|default:'' }}"
                    data-address="{{ store.physical_address|default:'' }}"
                    data-logo="{% if store.logo %}{{ store.logo.url }}{% endif %}"
                    data-type="{{ store.get_store_type_display }}">
                {{ store.name }} ({{ store.code }}) - {{ store.location }}
            </option>
            {% endfor %}
        </select>
        {% if no_stores_message %}
        <div class="alert alert-warning mt-3">
            <i class="bi bi-exclamation-triangle me-2"></i>
            {{ error_message }}
        </div>
        {% endif %}
    </div>
</div>
