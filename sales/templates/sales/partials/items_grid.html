{% load i18n %}
<!-- Item Type Toggle -->
<div class="card mb-3">
    <div class="card-body">
        <div class="btn-group w-100 mb-3" role="group">
            <button type="button" class="btn btn-primary active"
                    data-type="all" onclick="switchItemType('all')">
                <i class="bi bi-grid me-1"></i>{% trans "All Items" %}
            </button>
            <button type="button" class="btn btn-outline-primary"
                    data-type="product" onclick="switchItemType('product')">
                <i class="bi bi-box-seam me-1"></i>{% trans "Products" %}
            </button>
            <button type="button" class="btn btn-outline-primary"
                    data-type="service" onclick="switchItemType('service')">
                <i class="bi bi-gear me-1"></i>{% trans "Services" %}
            </button>
        </div>

        <!-- Search Bar -->
        <div class="input-group">
            <span class="input-group-text">
                <i class="bi bi-search"></i>
            </span>
            <input type="text" class="form-control" id="productSearchBar"
                   placeholder="{% trans 'Search products or services... (Press F1)' %}"
                   aria-label="Product search">
            <button class="btn btn-outline-secondary" type="button" onclick="clearProductSearch()">
                <i class="bi bi-x"></i>
            </button>
        </div>

        <!-- Items Grid -->
        <div id="productsGrid" class="products-grid-container mt-3">
            <!-- Items loaded via JS -->
        </div>

        <!-- Loading/Empty States -->
        <div id="productsLoading" class="text-center py-4" style="display: none;">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">{% trans "Loading..." %}</span>
            </div>
            <p class="mt-2">{% trans "Loading items..." %}</p>
        </div>

        <div id="productsEmpty" class="text-center py-4" style="display: none;">
            <i class="bi bi-inbox" style="font-size: 3rem; opacity: 0.3;"></i>
            <p class="mt-2">{% trans "No items found" %}</p>
            <button type="button" class="btn btn-sm btn-outline-primary mt-2" onclick="resetProductFilters()">
                <i class="bi bi-arrow-clockwise me-1"></i>{% trans "Reset Filters" %}
            </button>
        </div>

        <!-- Pagination -->
        <div class="d-flex justify-content-between align-items-center mt-3" id="productsPagination" style="display: none;">
            <button type="button" class="btn btn-sm btn-outline-primary" onclick="loadPreviousPage()">
                <i class="bi bi-chevron-left"></i> {% trans "Previous" %}
            </button>
            <span class="text-muted" id="paginationInfo"></span>
            <button type="button" class="btn btn-sm btn-outline-primary" onclick="loadNextPage()">
                {% trans "Next" %} <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>
</div>
