{% load i18n %}
<!-- Sync Management Panel -->
<div class="card mt-3" id="syncManagementPanel" style="display: none;">
    <div class="card-header bg-warning text-dark">
        <h6 class="mb-0">
            <i class="bi bi-arrow-repeat me-2"></i>Sync Management
            <span class="badge bg-dark ms-2" id="totalPendingBadge">0</span>
        </h6>
    </div>
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <small class="text-muted">Pending Items:</small>
                <strong id="pendingCount">0</strong>
            </div>
            <div>
                <small class="text-muted">Failed Items:</small>
                <strong class="text-danger" id="failedCount">0</strong>
            </div>
            <div>
                <small class="text-muted">Last Sync:</small>
                <strong id="lastSyncTime">Never</strong>
            </div>
        </div>

        <div class="d-grid gap-2">
            <button type="button" class="btn btn-primary btn-sm"
                    onclick="triggerManualSync()" id="manualSyncBtn">
                <i class="bi bi-arrow-repeat me-1"></i>Sync Now
            </button>
            <button type="button" class="btn btn-outline-secondary btn-sm"
                    onclick="viewSyncQueue()">
                <i class="bi bi-list-ul me-1"></i>View Queue
            </button>
            <button type="button" class="btn btn-outline-danger btn-sm"
                    onclick="retryFailedSync()">
                <i class="bi bi-exclamation-triangle me-1"></i>Retry Failed
            </button>
        </div>
    </div>
</div>
