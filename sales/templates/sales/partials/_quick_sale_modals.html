<!-- Quantity Modal -->
<div class="modal fade" id="quantity-modal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Enter Quantity</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Product: <span id="modal-product-name"></span></label>
          <input type="number" id="modal-quantity" class="form-control"
                 value="1" min="0.001" step="0.001" placeholder="Quantity">
        </div>
        <div class="keypad">
          <button type="button" data-value="1">1</button>
          <button type="button" data-value="2">2</button>
          <button type="button" data-value="3">3</button>
          <button type="button" data-value="4">4</button>
          <button type="button" data-value="5">5</button>
          <button type="button" data-value="6">6</button>
          <button type="button" data-value="7">7</button>
          <button type="button" data-value="8">8</button>
          <button type="button" data-value="9">9</button>
          <button type="button" data-value="." class="btn-warning">.</button>
          <button type="button" data-value="0" class="zero">0</button>
          <button type="button" data-action="clear" class="btn-danger">C</button>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" id="add-to-cart" class="btn btn-primary">Add to Cart</button>
      </div>
    </div>
  </div>
</div>

<!-- Success Modal -->
<div class="modal fade" id="success-modal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title">Sale Completed!</h5>
      </div>
      <div class="modal-body text-center">
        <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
        <h4>Invoice: <span id="success-invoice"></span></h4>
        <p>Total: <span id="success-total"></span></p>
        <p>Change: <span id="success-change"></span></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="new-sale">New Sale</button>
        <button type="button" class="btn btn-primary" id="print-receipt">Print Receipt</button>
      </div>
    </div>
  </div>
</div>
