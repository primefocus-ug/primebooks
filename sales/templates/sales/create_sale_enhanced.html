{% block extra_css %}
{{ block.super }}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
<style>
:root {
    --primary: #667eea;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --bg-primary: #ffffff;
    --bg-secondary: #f8f9fa;
    --bg-tertiary: #e9ecef;
    --text-primary: #212529;
    --text-secondary: #6c757d;
    --border-color: #dee2e6;
    --shadow-sm: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
    --shadow-md: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
    --accent-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --card-hover: rgba(0, 0, 0, 0.05);
}

[data-bs-theme="dark"] {
    --bg-primary: #1a1d29;
    --bg-secondary: #242736;
    --bg-tertiary: #2d3142;
    --text-primary: #e9ecef;
    --text-secondary: #adb5bd;
    --border-color: #3d4152;
    --shadow-sm: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.3);
    --shadow-md: 0 0.5rem 1rem rgba(0, 0, 0, 0.5);
    --card-hover: rgba(255, 255, 255, 0.05);
}

.sale-container { max-width: 1400px; margin: 0 auto; }

/* Document Type Badges */
.doc-badges {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
}

.doc-badge {
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s;
    border: 2px solid #e5e7eb;
    background: var(--bg-secondary);
    color: var(--text-primary);
}

.doc-badge.active {
    border-color: var(--primary);
    background: var(--accent-gradient);
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
}

/* Items Table */
.items-table {
    background: var(--bg-primary);
    border-radius: 12px;
    border: 1px solid var(--border-color);
    overflow: hidden;
}

.item-row {
    transition: all 0.2s;
    border-left: 4px solid transparent;
}

.item-row:hover {
    background: var(--card-hover);
    border-left-color: var(--primary);
}

/* Totals Card */
.totals-card {
    position: sticky;
    top: 1rem;
    background: var(--accent-gradient);
    color: white;
    border-radius: 16px;
    box-shadow: var(--shadow-md);
}

.total-row {
    display: flex;
    justify-content: space-between;
    padding: 0.75rem 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
}

.total-row.grand {
    border-top: 2px solid rgba(255, 255, 255, 0.5);
    padding-top: 1.5rem;
    margin-top: 1rem;
    font-size: 1.5rem;
    font-weight: bold;
}

/* Search Results */
.search-results {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    box-shadow: var(--shadow-md);
    z-index: 1000;
    max-height: 400px;
    overflow-y: auto;
    display: none;
    margin-top: 0.5rem;
}

.search-results.show { display: block; }

.search-item {
    padding: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    border-bottom: 1px solid var(--border-color);
    color: var(--text-primary);
}

.search-item:hover { background: var(--card-hover); }

/* Stock Indicators */
.stock-badge {
    font-size: 0.75rem;
    padding: 0.25rem 0.75rem;
    border-radius: 12px;
    font-weight: 600;
}

.stock-ok { background: rgba(16, 185, 129, 0.1); color: var(--success); }
.stock-low { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
.stock-out { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

/* Loading */
.loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.loading-overlay.active { display: flex; }

.spinner {
    width: 3rem;
    height: 3rem;
    border: 4px solid #e5e7eb;
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Draft Badge */
.draft-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    background: linear-gradient(135deg, var(--warning), #d97706);
    color: white;
    border-radius: 20px;
    font-weight: 600;
    margin-bottom: 1rem;
}

/* Empty State */
.empty-state {
    text-align: center;
    padding: 3rem;
    color: var(--text-secondary);
}

.empty-state i {
    font-size: 4rem;
    opacity: 0.3;
    margin-bottom: 1rem;
}

/* View Toggle */
.view-toggle {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 1rem;
}

.view-toggle-btn {
    padding: 0.5rem;
    border: 1px solid var(--border-color);
    background: var(--bg-secondary);
    color: var(--text-primary);
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.2s;
}

.view-toggle-btn.active {
    background: var(--accent-gradient);
    color: white;
}

/* Products Grid */
.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
}

.product-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 1.25rem;
    transition: all 0.3s ease;
    cursor: pointer;
    color: var(--text-primary);
}

.product-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-md);
    border-color: #667eea;
}

/* Products List */
.products-list {
    display: none; /* Hidden by default, toggle via JS */
}

.products-list .product-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    margin-bottom: 0.75rem;
    cursor: pointer;
    transition: background 0.2s;
    color: var(--text-primary);
}

.products-list .product-item:hover {
    background: var(--card-hover);
}

.products-list .product-info {
    flex-grow: 1;
}

.products-list .product-price {
    font-weight: bold;
    color: var(--text-primary);
}

.products-list .product-stock {
    font-size: 0.8rem;
    color: var(--text-secondary);
}

@media (max-width: 768px) {
    .totals-card {
        position: relative;
        top: 0;
        margin-top: 2rem;
    }
}
</style>
{% endblock %}

<!-- Add this HTML after the products section header -->
<div class="view-toggle">
    <button type="button" class="view-toggle-btn active" id="gridViewBtn" onclick="switchView('grid')">
        <i class="bi bi-grid"></i> Grid
    </button>
    <button type="button" class="view-toggle-btn" id="listViewBtn" onclick="switchView('list')">
        <i class="bi bi-list"></i> List
    </button>
</div>

<!-- Add this after the productsGrid div -->
<div id="productsList" class="products-list">
    <!-- Items loaded via JS -->
</div>

{% block extra_js %}
<script>
// ...existing code...

// Add to SaleState
SaleState.currentView = 'grid'; // Default to grid

// Updated displayItems function to handle both views
function displayItems(items) {
    const grid = document.getElementById('productsGrid');
    const list = document.getElementById('productsList');
    hideProductsLoading();

    if (items.length === 0) {
        showProductsEmpty();
        return;
    }

    if (SaleState.currentView === 'grid') {
        grid.style.display = 'grid';
        list.style.display = 'none';
        grid.innerHTML = items.map(item => {
            const isProduct = item.item_type === 'PRODUCT';
            const outOfStock = isProduct && item.stock && item.stock.available <= 0;
            const lowStock = isProduct && item.stock && item.stock.available <= (item.stock.minimum_stock || 10);

            return `
                <div class="col-md-6">
                    <div class="product-card ${outOfStock ? 'out-of-stock' : ''}">
                        ${item.discount_percentage > 0 ? `
                            <div class="product-discount-badge">
                                -${item.discount_percentage}%
                            </div>
                        ` : ''}

                        <div class="product-image-placeholder">
                            <i class="bi ${isProduct ? 'bi-box' : 'bi-gear'}"></i>
                        </div>

                        <div class="product-info">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h6 class="product-name">${escapeHtml(item.name)}</h6>
                                <span class="item-badge ${isProduct ? 'product-badge' : 'service-badge'}">
                                    ${item.item_type}
                                </span>
                            </div>

                            <p class="product-sku text-muted">
                                ${item.code || 'No code'} | ${isProduct ? 'Product' : 'Service'}
                            </p>

                            <div class="product-price">
                                <span class="price-current">${formatCurrency(item.final_price)}</span>
                                ${item.original_price > item.final_price ? `
                                    <span class="price-original">${formatCurrency(item.original_price)}</span>
                                ` : ''}
                            </div>

                            ${isProduct && item.stock ? `
                                <div class="product-stock">
                                    <span class="stock-indicator ${outOfStock ? 'out-of-stock' : lowStock ? 'low-stock' : 'in-stock'}"></span>
                                    <span>Stock: ${item.stock.available} ${item.stock.unit}</span>
                                </div>
                                ${lowStock ? `
                                    <div class="stock-warning">
                                        <i class="bi bi-exclamation-triangle"></i> Low stock
                                    </div>
                                ` : ''}
                            ` : ''}

                            ${!isProduct ? `
                                <div class="product-stock">
                                    <span class="stock-indicator in-stock"></span>
                                    <span>Service available</span>
                                </div>
                            ` : ''}
                        </div>

                        <div class="product-actions">
                            <button type="button" class="btn-add-to-cart"
                                    onclick='addToCart(${JSON.stringify(item).replace(/'/g, "&#39;")})'
                                    ${outOfStock ? 'disabled' : ''}
                                    title="${outOfStock ? 'Out of stock' : 'Add to cart'}">
                                <i class="bi bi-cart-plus"></i>
                                ${outOfStock ? 'Out of Stock' : 'Add to Cart'}
                            </button>
                            <button type="button" class="btn-quick-view"
                                    onclick='showItemDetails(${JSON.stringify(item).replace(/'/g, "&#39;")})'
                                    title="View details">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    } else {
        grid.style.display = 'none';
        list.style.display = 'block';
        list.innerHTML = items.map(item => {
            const isProduct = item.item_type === 'PRODUCT';
            const outOfStock = isProduct && item.stock && item.stock.available <= 0;
            const lowStock = isProduct && item.stock && item.stock.available <= (item.stock.minimum_stock || 10);

            return `
                <div class="product-item" onclick='addToCart(${JSON.stringify(item).replace(/'/g, "&#39;")})'>
                    <div class="product-info">
                        <div class="d-flex justify-content-between align-items-start">
                            <strong>${escapeHtml(item.name)}</strong>
                            <span class="item-badge ${isProduct ? 'product-badge' : 'service-badge'}">
                                ${item.item_type}
                            </span>
                        </div>
                        <small class="text-muted">${item.code || 'No code'}</small>
                        ${isProduct && item.stock ? `<div class="product-stock text-${outOfStock ? 'danger' : lowStock ? 'warning' : 'success'}">
                            Stock: ${item.stock.available} ${item.stock.unit}
                        </div>` : ''}
                    </div>
                    <div class="product-price">${formatCurrency(item.final_price)}</div>
                    <button type="button" class="btn btn-sm btn-primary">
                        <i class="bi bi-cart-plus"></i>
                    </button>
                </div>
            `;
        }).join('');
    }

    const pagination = document.getElementById('productsPagination');
    if (pagination) {
        pagination.style.display = SaleState.totalItems > SaleState.itemsPerPage ? 'flex' : 'none';
    }
}

// Switch view function
function switchView(view) {
    SaleState.currentView = view;
    document.getElementById('gridViewBtn').classList.toggle('active', view === 'grid');
    document.getElementById('listViewBtn').classList.toggle('active', view === 'list');
    if (SaleState.items.length > 0) {
        displayItems(SaleState.items);
    }
}

// ...existing code...
</script>
{% endblock %}
