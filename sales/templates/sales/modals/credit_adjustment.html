{% load i18n %}

<!-- Credit Adjustment Modal -->
<div class="modal fade" id="creditAdjustmentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-sliders me-2"></i>Adjust Credit Limit
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="creditAdjustmentCustomerInfo" class="alert alert-info mb-3">
                    <strong id="creditAdjustCustomerName">Customer Name</strong>
                    <div class="mt-2">
                        <small>Current Limit: <strong id="creditAdjustCurrentLimit">0</strong></small><br>
                        <small>Current Balance: <strong id="creditAdjustCurrentBalance">0</strong></small><br>
                        <small>Available: <strong id="creditAdjustAvailable">0</strong></small>
                    </div>
                </div>

                <form id="creditAdjustmentForm">
                    <div class="mb-3">
                        <label class="form-label">Adjustment Type</label>
                        <select class="form-select" id="creditAdjustmentType" required>
                            <option value="SET_LIMIT">Set New Credit Limit</option>
                            <option value="INCREASE_LIMIT">Increase Limit</option>
                            <option value="DECREASE_LIMIT">Decrease Limit</option>
                            <option value="ADD_BALANCE">Add to Balance</option>
                            <option value="REDUCE_BALANCE">Reduce Balance</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Amount (UGX)</label>
                        <input type="number" class="form-control" id="creditAdjustmentAmount"
                               min="0" step="1000" required>
                        <small class="text-muted" id="creditAdjustmentHint"></small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Reason for Adjustment *</label>
                        <textarea class="form-control" id="creditAdjustmentReason" rows="3"
                                  required placeholder="Explain why this adjustment is being made..."></textarea>
                    </div>

                    <div class="alert alert-warning">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        <strong>Note:</strong> This adjustment will be recorded in the customer's credit history.
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    Cancel
                </button>
                <button type="button" class="btn btn-primary" onclick="submitCreditAdjustment()">
                    <span id="creditAdjustBtnText">
                        <i class="bi bi-check-circle me-1"></i>Apply Adjustment
                    </span>
                    <span id="creditAdjustBtnLoading" style="display: none;">
                        <span class="spinner-border spinner-border-sm me-1"></span>Processing...
                    </span>
                </button>
            </div>
        </div>
    </div>
</div>
