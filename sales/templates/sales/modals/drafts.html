{% load i18n %}
<!-- Drafts Modal -->
<div class="modal fade" id="draftsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-files me-2"></i>Saved Drafts
                    <span class="badge bg-primary ms-2" id="draftsCount">0</span>
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- Drafts Stats -->
                <div class="drafts-stats">
                    <div class="row text-center">
                        <div class="col-4">
                            <small class="text-muted">Total Drafts</small>
                            <h4 id="totalDraftsCount">0</h4>
                        </div>
                        <div class="col-4">
                            <small class="text-muted">Last Updated</small>
                            <h6 id="lastDraftDate">Never</h6>
                        </div>
                        <div class="col-4">
                            <small class="text-muted">Actions</small>
                            <div>
                                <button type="button" class="btn btn-sm btn-outline-danger" onclick="clearAllDrafts()">
                                    <i class="bi bi-trash"></i> Clear All
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Drafts List -->
                <div id="draftsList"></div>

                <!-- Empty State -->
                <div id="draftsEmptyState" class="text-center py-5">
                    <i class="bi bi-folder-x" style="font-size: 3rem; opacity: 0.3;"></i>
                    <h5 class="mt-3">No saved drafts</h5>
                    <p class="text-muted">Save your current sale as a draft to continue later</p>
                    <button type="button" class="btn btn-primary" onclick="saveAsDraft()">
                        <i class="bi bi-save me-2"></i>Save Current as Draft
                    </button>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    Close
                </button>
                <button type="button" class="btn btn-primary" onclick="saveAsDraft()">
                    <i class="bi bi-plus-circle me-2"></i>Save New Draft
                </button>
            </div>
        </div>
    </div>
</div>
