{% load i18n %}
<!-- New Customer Modal -->
<div class="modal fade" id="newCustomerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">{% trans "Add New Customer" %}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="newCustomerForm">
                    <div class="mb-3">
                        <label class="form-label">{% trans "Name" %} *</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{% trans "Phone" %} *</label>
                        <input type="tel" class="form-control" name="phone" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{% trans "Email" %}</label>
                        <input type="email" class="form-control" name="email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{% trans "TIN (Optional)" %}</label>
                        <input type="text" class="form-control" name="tin"
                               pattern="\d{10}" maxlength="10"
                               placeholder="10-digit TIN">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{% trans "Address" %}</label>
                        <textarea class="form-control" name="address" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    {% trans "Cancel" %}
                </button>
                <button type="button" class="btn btn-primary" onclick="saveNewCustomer()" id="saveCustomerBtn">
                    <span id="saveCustomerText">{% trans "Save" %}</span>
                    <span id="saveCustomerLoading" style="display: none;">
                        <span class="spinner-border spinner-border-sm" role="status"></span>
                    </span>
                </button>
            </div>
        </div>
    </div>
</div>
