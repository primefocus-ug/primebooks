{% extends 'base.html' %}
{% load static %}
{% load custom_filters %}
{% block title %}Update Store{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'theme.css' %}"
{% endblock %}
{% block content %}
<h2 class="mb-3">Update Store</h2>

<form method="post" novalidate>
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" class="btn btn-primary">Update Store</button>
    {% if perms.stores.view_store %}
    <a href="{% url 'stores:store_detail' form.instance.pk %}" class="btn btn-secondary">Cancel</a>
    {% endif %}
</form>
{% endblock %}
