{% extends "efris/base.html" %}
{% load static %}

{% block efris_content %}
<div class="efris-card">
    <div class="card-body">
        <h5 class="card-title">
            <i class="fas fa-user-edit"></i> Update Buyer Details
        </h5>

        <form method="post" class="mt-4">
            {% csrf_token %}

            <div class="alert alert-info">
                <i class="fas fa-info-circle"></i>
                Update buyer information for an already issued invoice. Invoice number is required.
            </div>

            <div class="mb-3">
                <label for="invoice_no" class="form-label">Invoice Number *</label>
                <input type="text" class="form-control" id="invoice_no"
                       name="invoice_no" required
                       placeholder="Enter invoice number">
            </div>

            <div class="mb-3">
                <label for="buyer_type" class="form-label">Buyer Type *</label>
                <select class="form-select" id="buyer_type" name="buyer_type" required>
                    <option value="">Select buyer type</option>
                    <option value="0">B2B (Business)</option>
                    <option value="1">B2C (Consumer)</option>
                    <option value="2">Foreigner</option>
                    <option value="3">B2G (Government)</option>
                </select>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="buyer_tin" class="form-label">Buyer TIN</label>
                        <input type="text" class="form-control" id="buyer_tin"
                               name="buyer_tin" maxlength="20"
                               placeholder="Required for B2B">
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="buyer_nin_brn" class="form-label">Buyer NIN/BRN</label>
                        <input type="text" class="form-control" id="buyer_nin_brn"
                               name="buyer_nin_brn" maxlength="100">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="buyer_legal_name" class="form-label">Legal Name</label>
                        <input type="text" class="form-control" id="buyer_legal_name" name="buyer_legal_name" maxlength="256">
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="buyer_business_name" class="form-label">Business Name</label>
                        <input type="text" class="form-control" id="buyer_business_name"
                               name="buyer_business_name" maxlength="256">
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="buyer_address" class="form-label">Address</label>
                <textarea class="form-control" id="buyer_address"
                          name="buyer_address" rows="2" maxlength="500"></textarea>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="buyer_email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="buyer_email"
                               name="buyer_email" maxlength="50">
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="buyer_mobile" class="form-label">Mobile Phone</label>
                        <input type="tel" class="form-control" id="buyer_mobile"
                               name="buyer_mobile" maxlength="30">
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="buyer_line_phone" class="form-label">Line Phone</label>
                        <input type="tel" class="form-control" id="buyer_line_phone"
                               name="buyer_line_phone" maxlength="30">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="buyer_citizenship" class="form-label">Citizenship</label>
                        <input type="text" class="form-control" id="buyer_citizenship"
                               name="buyer_citizenship" maxlength="128"
                               placeholder="e.g., UG-Uganda">
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="buyer_sector" class="form-label">Sector</label>
                        <input type="text" class="form-control" id="buyer_sector"
                               name="buyer_sector" maxlength="200">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Update Buyer Details
            </button>
            <a href="{% url 'efris:dashboard' %}" class="btn btn-secondary">
                <i class="fas fa-times"></i> Cancel
            </a>
        </form>
    </div>
</div>

<script>
// Show/hide TIN field based on buyer type
document.getElementById('buyer_type').addEventListener('change', function() {
    const tinField = document.getElementById('buyer_tin');
    if (this.value === '0') { // B2B
        tinField.required = true;
        tinField.parentElement.querySelector('label').innerHTML = 'Buyer TIN *';
    } else {
        tinField.required = false;
        tinField.parentElement.querySelector('label').innerHTML = 'Buyer TIN';
    }
});
</script>
{% endblock %}
