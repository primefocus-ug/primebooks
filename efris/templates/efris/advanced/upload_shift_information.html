{% extends "efris/base.html" %}
{% load static %}

{% block efris_content %}
<div class="efris-card">
    <div class="card-body">
        <h5 class="card-title">
            <i class="fas fa-clock"></i> Upload Shift Information
        </h5>

        <form method="post" class="mt-4">
            {% csrf_token %}

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="shift_no" class="form-label">Shift Number *</label>
                        <input type="text" class="form-control" id="shift_no"
                               name="shift_no" required
                               placeholder="e.g., 20220101-01">
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="fuel_type" class="form-label">Fuel Type *</label>
                        <input type="text" class="form-control" id="fuel_type"
                               name="fuel_type" required
                               placeholder="e.g., Kerosene">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="start_volume" class="form-label">Start Volume *</label>
                        <input type="number" step="0.01" class="form-control"
                               id="start_volume" name="start_volume" required>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="end_volume" class="form-label">End Volume *</label>
                        <input type="number" step="0.01" class="form-control"
                               id="end_volume" name="end_volume" required>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="goods_id" class="form-label">Goods ID *</label>
                        <input type="text" class="form-control" id="goods_id"
                               name="goods_id" required>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="goods_code" class="form-label">Goods Code *</label>
                        <input type="text" class="form-control" id="goods_code"
                               name="goods_code" required>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="invoice_amount" class="form-label">Invoice Amount *</label>
                        <input type="number" step="0.01" class="form-control"
                               id="invoice_amount" name="invoice_amount" required>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="pump_no" class="form-label">Pump No *</label>
                        <input type="text" class="form-control" id="pump_no"
                               name="pump_no" required>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="nozzle_no" class="form-label">Nozzle No *</label>
                        <input type="text" class="form-control" id="nozzle_no"
                               name="nozzle_no" required>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="tank_no" class="form-label">Tank No *</label>
                        <input type="text" class="form-control" id="tank_no"
                               name="tank_no" required>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="user_name" class="form-label">User Name *</label>
                        <input type="text" class="form-control" id="user_name"
                               name="user_name" required>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="user_code" class="form-label">User Code *</label>
                        <input type="text" class="form-control" id="user_code"
                               name="user_code" required>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="start_time" class="form-label">Start Time *</label>
                        <input type="datetime-local" class="form-control"
                               id="start_time" name="start_time" required>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="end_time" class="form-label">End Time *</label>
                        <input type="datetime-local" class="form-control"
                               id="end_time" name="end_time" required>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="invoice_number" class="form-label">Invoice Number *</label>
                <input type="text" class="form-control" id="invoice_number"
                       name="invoice_number" required>
            </div>

            <button type="submit" class="btn btn-primary">
                <i class="fas fa-upload"></i> Upload Shift Information
            </button>
        </form>
    </div>
</div>

<script>
// Set default times
const now = new Date();
document.getElementById('end_time').value = now.toISOString().slice(0, 16);
const yesterday = new Date(now);
yesterday.setDate(yesterday.getDate() - 1);
document.getElementById('start_time').value = yesterday.toISOString().slice(0, 16);
</script>
{% endblock %}
