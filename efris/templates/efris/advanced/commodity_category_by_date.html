{% extends "efris/base.html" %}
{% load static %}

{% block efris_content %}
<div class="efris-card">
    <div class="card-body">
        <h5 class="card-title">Query Commodity Category/Excise Duty by Date</h5>

        <form method="post" class="mt-4">
            {% csrf_token %}

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="category_code" class="form-label">Category Code</label>
                        <input type="text" class="form-control" id="category_code"
                               name="category_code" required
                               placeholder="e.g., 00000000001">
                        <small class="form-text text-muted">18-digit category code</small>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="query_type" class="form-label">Query Type</label>
                        <select class="form-select" id="query_type" name="query_type" required>
                            <option value="1">Commodity Category</option>
                            <option value="2">Excise Duty</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="issue_date" class="form-label">Issue Date</label>
                <input type="datetime-local" class="form-control" id="issue_date"
                       name="issue_date" required>
                <small class="form-text text-muted">Format: yyyy-MM-dd HH:mm:ss</small>
            </div>

            <button type="submit" class="btn btn-primary">
                <i class="fas fa-search"></i> Query
            </button>
        </form>
    </div>
</div>

<script>
// Set current datetime as default
document.getElementById('issue_date').value = new Date().toISOString().slice(0, 16);
</script>
{% endblock %}
