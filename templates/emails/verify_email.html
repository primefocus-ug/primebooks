<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Verify Your Email</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f9fb;
            padding: 20px;
            color: #333;
        }
        .container {
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
        }
        a.button {
            display: inline-block;
            background: #007bff;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Hello {{ user.get_full_name|default:user.username }},</h2>
    <p>Please verify your email address by clicking the button below:</p>
    <p><a href="{{ verification_link }}" class="button">Verify Email</a></p>
    <p>This link will expire in 24 hours.</p>
    <p>Thanks,<br>The {{ request.site.name|default:"Support" }} Team</p>
</div>
</body>
</html>
