<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Payment Cancelled</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.08);max-width:420px;width:100%;padding:36px;text-align:center}
  </style>
</head>
<body>
<div class="card">
  <div style="font-size:60px;margin-bottom:16px;">🚫</div>
  <h1 style="font-size:20px;font-weight:700;margin-bottom:8px;">Payment Cancelled</h1>
  <p style="color:#6b7280;font-size:14px;margin-bottom:24px;">
    You cancelled the payment. No charges were made.<br>
    You can try again at any time.
  </p>
  <a href="/pay/invoice/{{ token }}/"
     style="display:inline-block;padding:12px 24px;background:#1a6b4a;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px;">
    Return to Invoice
  </a>
</div>
</body>
</html>
