{% load static %}

{% if user.is_authenticated %}
<style>
/* ════════════ FIELD-LEVEL TOOLTIP ════════════ */
.pb-help {
    display: inline-flex; align-items: center;
    cursor: pointer; position: relative; z-index: 1;
    /* Larger touch target on mobile */
    min-width: 28px; min-height: 28px;
}
.pb-help i {
    font-size: 0.8rem; color: var(--text-muted, #9ca3af);
    transition: color 0.15s;
}
.pb-help:hover i,
.pb-help:focus i { color: var(--primary-500, #3b82f6); }

/* Tooltip bubble */
.pb-help-tooltip {
    position: fixed; z-index: 9400;
    max-width: min(260px, calc(100vw - 24px));
    min-width: 140px;
    background: var(--bg-primary, #fff);
    border: 1px solid var(--border-color, #e5e7eb);
    border-radius: 10px; padding: 0.65rem 0.875rem;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
    font-size: 0.785rem; color: var(--text-primary, #111827);
    line-height: 1.6; pointer-events: none;
    opacity: 0; transform: translateY(4px) scale(0.97);
    transition: opacity 0.14s ease, transform 0.14s ease;
}
.pb-help-tooltip.visible {
    opacity: 1; transform: translateY(0) scale(1);
}
[data-theme="dark"] .pb-help-tooltip {
    background: #1e293b; border-color: rgba(255,255,255,0.1);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    color: #e2e8f0;
}
.pb-help-tooltip-title {
    font-weight: 700; color: var(--primary-600, #2563eb);
    margin-bottom: 0.25rem; font-size: 0.72rem;
    text-transform: uppercase; letter-spacing: 0.04em;
}
[data-theme="dark"] .pb-help-tooltip-title { color: #818cf8; }

/* Arrow — top */
.pb-help-tooltip::before {
    content: ''; position: absolute;
    border: 6px solid transparent;
}
.pb-help-tooltip.arrow-top::before {
    border-bottom-color: var(--border-color, #e5e7eb);
    top: -13px; left: 16px;
}
.pb-help-tooltip.arrow-top::after {
    content: ''; position: absolute; border: 5px solid transparent;
    border-bottom-color: var(--bg-primary, #fff);
    top: -10px; left: 17px;
}
/* Arrow — bottom (flipped) */
.pb-help-tooltip.arrow-bottom::before {
    border-top-color: var(--border-color, #e5e7eb);
    bottom: -13px; top: auto; left: 16px;
}
.pb-help-tooltip.arrow-bottom::after {
    content: ''; position: absolute; border: 5px solid transparent;
    border-top-color: var(--bg-primary, #fff);
    bottom: -10px; top: auto; left: 17px;
}
[data-theme="dark"] .pb-help-tooltip.arrow-top::before  { border-bottom-color: rgba(255,255,255,0.1); }
[data-theme="dark"] .pb-help-tooltip.arrow-top::after   { border-bottom-color: #1e293b; }
[data-theme="dark"] .pb-help-tooltip.arrow-bottom::before { border-top-color: rgba(255,255,255,0.1); }
[data-theme="dark"] .pb-help-tooltip.arrow-bottom::after  { border-top-color: #1e293b; }

/* ── Mobile tooltip: bottom sheet style on small screens ── */
@media (max-width: 480px) {
    .pb-help-tooltip {
        position: fixed !important;
        top: auto !important;
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
        max-width: 100% !important;
        min-width: 0 !important;
        border-radius: 16px 16px 0 0;
        padding: 1rem 1.25rem 1.5rem;
        box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
        pointer-events: auto;
        transform: translateY(8px) !important;
    }
    .pb-help-tooltip.visible {
        transform: translateY(0) !important;
    }
    .pb-help-tooltip::before,
    .pb-help-tooltip::after { display: none; }
}

/* ════════════ PAGE HINT OVERLAY ════════════ */
#pbHintOverlay {
    display: none; position: fixed; inset: 0; z-index: 9200;
    pointer-events: none;
}
#pbHintOverlay.active { display: block; }

/* Dark veil */
.pb-hint-veil {
    position: absolute; inset: 0;
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(1px);
    pointer-events: auto;
}

/* Individual hint spotlight */
.pb-hint-spot {
    position: absolute; z-index: 2;
    pointer-events: auto;
    animation: hintPop 0.3s cubic-bezier(0.16,1,0.3,1);
}
@keyframes hintPop { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }

.pb-hint-highlight {
    border: 2px solid #6366f1;
    border-radius: 8px;
    box-shadow: 0 0 0 4px rgba(99,102,241,0.2);
    position: absolute; inset: -4px;
    animation: hintPulse 2s ease infinite;
}
@keyframes hintPulse {
    0%,100%{box-shadow:0 0 0 4px rgba(99,102,241,0.2)}
    50%    {box-shadow:0 0 0 8px rgba(99,102,241,0)}
}

.pb-hint-bubble {
    position: absolute; top: calc(100% + 12px); left: 0;
    min-width: 180px;
    max-width: min(260px, calc(100vw - 32px));
    background: #0f172a; color: #f1f5f9;
    border: 1px solid rgba(99,102,241,0.4);
    border-radius: 10px; padding: 0.6rem 0.875rem;
    font-size: 0.775rem; line-height: 1.6;
    font-family: var(--font-family, 'Segoe UI', sans-serif);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    z-index: 3;
    white-space: normal; word-break: break-word;
}

/* Bubble repositioning: clamp to viewport */
.pb-hint-bubble.flip-up {
    top: auto;
    bottom: calc(100% + 12px);
}
.pb-hint-bubble.align-right {
    left: auto;
    right: 0;
}

.pb-hint-bubble-title {
    font-size: 0.68rem; font-weight: 700;
    color: #818cf8; text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 0.2rem;
    display: flex; align-items: center; gap: 0.35rem;
}
.pb-hint-bubble-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%;
    background: #6366f1; color: #fff;
    font-size: 0.6rem; font-weight: 700;
    flex-shrink: 0;
}

/* ── Mobile: bubbles become bottom-anchored cards ── */
@media (max-width: 600px) {
    .pb-hint-bubble {
        position: fixed !important;
        top: auto !important;
        bottom: 5rem !important;
        left: 12px !important;
        right: 12px !important;
        max-width: none !important;
        min-width: 0 !important;
        border-radius: 12px;
        font-size: 0.82rem;
        padding: 0.75rem 1rem;
    }
}

/* ════════════ FLOATING ? BUTTON ════════════ */
#pbHintToggle {
    position: fixed; bottom: 1.75rem; left: 1.75rem; z-index: 8500;
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--bg-primary, #fff);
    border: 1.5px solid var(--border-color, #e5e7eb);
    color: var(--text-muted, #6b7280);
    display: none; align-items: center; justify-content: center;
    font-size: 1rem; cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    transition: all 0.15s;
    font-weight: 700; font-family: serif;
    /* Better touch target */
    touch-action: manipulation;
}
[data-theme="dark"] #pbHintToggle { background:#1e293b; border-color:rgba(255,255,255,0.1); color:#94a3b8; }
#pbHintToggle.visible { display: flex; animation: hintBtnPop 0.3s cubic-bezier(0.16,1,0.3,1); }
@keyframes hintBtnPop { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
#pbHintToggle:hover { border-color: #6366f1; color: #6366f1; transform: scale(1.08); }
#pbHintToggle:focus-visible { outline: 2px solid #6366f1; outline-offset: 2px; }
#pbHintToggle.active { background: #6366f1; color: #fff; border-color: #6366f1; }

/* Responsive button position */
@media (max-width: 600px) {
    #pbHintToggle {
        bottom: 1.25rem; left: 1.25rem;
        width: 48px; height: 48px; /* bigger tap target */
    }
}

/* Hint counter badge on button */
.pb-hint-count {
    position: absolute; top: -4px; right: -4px;
    background: #6366f1; color: #fff;
    font-size: 0.6rem; font-weight: 700;
    width: 16px; height: 16px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

/* ════════════ HINT CONTROLS BAR ════════════ */
#pbHintControls {
    position: fixed; bottom: 1.75rem; left: 50%; transform: translateX(-50%);
    z-index: 9300; display: none;
    align-items: center; gap: 0.75rem;
    background: #0f172a; border: 1px solid rgba(99,102,241,0.4);
    border-radius: 30px; padding: 0.5rem 1rem;
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.78rem; color: #f1f5f9;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    /* Prevent overflow on small screens */
    max-width: calc(100vw - 2rem);
    white-space: nowrap;
}
#pbHintControls.show { display: flex; }

/* Responsive: tighter on mobile */
@media (max-width: 480px) {
    #pbHintControls {
        bottom: 1.25rem;
        gap: 0.4rem;
        padding: 0.45rem 0.75rem;
        border-radius: 24px;
    }
    /* Hide "Prev" label text; show only icon */
    #pbHintPrev .pb-hint-ctrl-label,
    #pbHintNext .pb-hint-ctrl-label { display: none; }
}

.pb-hint-ctrl-btn {
    background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3);
    color: #a5b4fc; border-radius: 20px; padding: 0.28rem 0.8rem;
    font-size: 0.73rem; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all 0.15s;
    touch-action: manipulation;
    display: inline-flex; align-items: center; gap: 0.3rem;
}
.pb-hint-ctrl-btn:hover { background: rgba(99,102,241,0.3); color: #fff; }
.pb-hint-ctrl-btn:focus-visible { outline: 2px solid #818cf8; outline-offset: 2px; }
.pb-hint-ctrl-done {
    background: #6366f1; border-color: #6366f1; color: #fff;
}
.pb-hint-ctrl-done:hover { background: #4f46e5; }

/* Swipe hint on mobile (shows briefly then fades) */
@media (max-width: 600px) {
    #pbHintSwipeHint {
        font-size: 0.65rem; color: rgba(148,163,184,0.8);
        display: flex; align-items: center; gap: 0.25rem;
    }
}
#pbHintSwipeHint { display: none; }
</style>

<!-- Tooltip bubble (single, repositioned on hover) -->
<div class="pb-help-tooltip" id="pbHelpTooltip" role="tooltip" aria-live="polite"></div>

<!-- Page hint overlay -->
<div id="pbHintOverlay">
    <div class="pb-hint-veil" id="pbHintVeil"></div>
</div>

<!-- Floating ? button -->
<button id="pbHintToggle" aria-label="Show page hints"></button>

<!-- Hint controls bar -->
<div id="pbHintControls" role="navigation" aria-label="Hint navigation">
    <span id="pbHintProgress" style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:#94a3b8;flex-shrink:0"></span>
    <button class="pb-hint-ctrl-btn" id="pbHintPrev" aria-label="Previous hint">
        <i class="bi bi-arrow-left"></i>
        <span class="pb-hint-ctrl-label">Prev</span>
    </button>
    <button class="pb-hint-ctrl-btn" id="pbHintNext" aria-label="Next hint">
        <span class="pb-hint-ctrl-label">Next</span>
        <i class="bi bi-arrow-right"></i>
    </button>
    <button class="pb-hint-ctrl-btn pb-hint-ctrl-done" id="pbHintDone">Done</button>
    <span id="pbHintSwipeHint"><i class="bi bi-phone"></i> swipe</span>
</div>

<script>
(function(){
'use strict';

const isMobile = () => window.matchMedia('(max-width: 600px)').matches;
const isTouchDevice = () => ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

// ── Field-level tooltip ───────────────────────────────────────
const tooltip = document.getElementById('pbHelpTooltip');

function showTooltip(el, text, title) {
    tooltip.innerHTML = (title ? `<div class="pb-help-tooltip-title">${title}</div>` : '') + text;
    tooltip.classList.remove('arrow-top', 'arrow-bottom');

    // Mobile: bottom sheet — just make visible, CSS handles position
    if (isMobile()) {
        tooltip.classList.add('visible');
        return;
    }

    tooltip.classList.add('visible');

    const rect = el.getBoundingClientRect();
    const tw   = Math.min(260, window.innerWidth - 24);
    const th   = tooltip.offsetHeight || 80;

    let left = rect.left;
    let top  = rect.bottom + 10;

    // Flip up if no space below
    if (top + th > window.innerHeight - 20) {
        top = rect.top - th - 10;
        tooltip.classList.add('arrow-bottom');
    } else {
        tooltip.classList.add('arrow-top');
    }

    // Keep within viewport horizontally
    left = Math.max(8, Math.min(left, window.innerWidth - tw - 8));
    tooltip.style.top  = top  + window.scrollY + 'px';
    tooltip.style.left = left + 'px';
    tooltip.style.maxWidth = tw + 'px';
}

function hideTooltip() {
    tooltip.classList.remove('visible');
}

function attachHelpTooltips() {
    document.querySelectorAll('.pb-help[data-help]').forEach(el => {
        if (el._pbHelpInit) return;
        el._pbHelpInit = true;

        el.addEventListener('mouseenter', () => {
            if (isTouchDevice()) return; // handled by tap
            showTooltip(el, el.dataset.help, el.dataset.helpTitle || null);
        });
        el.addEventListener('focus', () => {
            showTooltip(el, el.dataset.help, el.dataset.helpTitle || null);
        });
        el.addEventListener('mouseleave', hideTooltip);
        el.addEventListener('blur', hideTooltip);

        // Touch: tap to toggle
        el.addEventListener('touchstart', e => {
            e.preventDefault();
            if (tooltip.classList.contains('visible')) {
                hideTooltip();
            } else {
                showTooltip(el, el.dataset.help, el.dataset.helpTitle || null);
                // Auto-dismiss after 4s on mobile
                clearTimeout(el._pbTipTimer);
                el._pbTipTimer = setTimeout(hideTooltip, 4000);
            }
        }, { passive: false });

        el.setAttribute('tabindex', '0');
        el.setAttribute('role', 'button');
        el.setAttribute('aria-label', 'Help: ' + el.dataset.help);
    });
}

// Tap outside tooltip on mobile to dismiss
document.addEventListener('touchstart', e => {
    if (!tooltip.classList.contains('visible')) return;
    if (!e.target.closest('.pb-help') && !e.target.closest('.pb-help-tooltip')) {
        hideTooltip();
    }
}, { passive: true });

// ── Page-level hints ──────────────────────────────────────────
const overlay      = document.getElementById('pbHintOverlay');
const veil         = document.getElementById('pbHintVeil');
const hintToggle   = document.getElementById('pbHintToggle');
const hintControls = document.getElementById('pbHintControls');
const hintPrev     = document.getElementById('pbHintPrev');
const hintNext     = document.getElementById('pbHintNext');
const hintDone     = document.getElementById('pbHintDone');
const hintProg     = document.getElementById('pbHintProgress');
const swipeHint    = document.getElementById('pbHintSwipeHint');

let hintEls    = [];
let hintActive = false;
let hintCurrent= 0;
let spots      = [];

function collectHints() {
    return [...document.querySelectorAll('[data-page-hint]')];
}

function initHintButton() {
    hintEls = collectHints();
    if (!hintEls.length) { hintToggle.classList.remove('visible'); return; }
    hintToggle.classList.add('visible');
    hintToggle.innerHTML = `?<span class="pb-hint-count">${hintEls.length}</span>`;

    // Show swipe hint text on touch devices
    if (swipeHint) swipeHint.style.display = isTouchDevice() ? 'flex' : 'none';
}

function showHints() {
    hintEls = collectHints();
    if (!hintEls.length) return;
    hintActive  = true;
    hintCurrent = 0;
    overlay.classList.add('active');
    hintControls.classList.add('show');
    hintToggle.classList.add('active');
    overlay.style.pointerEvents = 'auto';
    renderHintSpots();
    highlightHint(0);
}

function hideHints() {
    hintActive = false;
    overlay.classList.remove('active');
    hintControls.classList.remove('show');
    hintToggle.classList.remove('active');
    overlay.style.pointerEvents = 'none';
    spots.forEach(s => s.remove());
    spots = [];
}

function repositionBubble(bubble, spotRect) {
    if (isMobile()) return; // CSS handles it

    const bw = 260;
    const bh = bubble.offsetHeight || 100;
    const vpH = window.innerHeight;
    const vpW = window.innerWidth;

    // Flip up if not enough space below
    if (spotRect.bottom + 12 + bh > vpH - 80) {
        bubble.classList.add('flip-up');
    } else {
        bubble.classList.remove('flip-up');
    }
    // Align right if overflows right edge
    if (spotRect.left + bw > vpW - 16) {
        bubble.classList.add('align-right');
    } else {
        bubble.classList.remove('align-right');
    }
}

function renderHintSpots() {
    spots.forEach(s => s.remove());
    spots = [];
    hintEls.forEach((el, i) => {
        const rect = el.getBoundingClientRect();
        const spot = document.createElement('div');
        spot.className = 'pb-hint-spot';
        spot.style.cssText = `top:${rect.top + window.scrollY}px;left:${rect.left}px;width:${rect.width}px;height:${rect.height}px;`;
        spot.innerHTML = `
            <div class="pb-hint-highlight"></div>
            <div class="pb-hint-bubble" style="display:none">
                <div class="pb-hint-bubble-title">
                    <span class="pb-hint-bubble-num">${i+1}</span>
                    ${el.dataset.hintLabel || 'Info'}
                </div>
                ${el.dataset.pageHint}
            </div>
        `;
        overlay.appendChild(spot);
        spots.push(spot);
    });
}

function highlightHint(idx) {
    spots.forEach((s, i) => {
        const bubble = s.querySelector('.pb-hint-bubble');
        s.style.zIndex = i === idx ? '3' : '2';
        if (bubble) {
            bubble.style.display = i === idx ? '' : 'none';
            if (i === idx) {
                const spotRect = hintEls[idx].getBoundingClientRect();
                requestAnimationFrame(() => repositionBubble(bubble, spotRect));
            }
        }
    });
    hintProg.textContent = `${idx + 1} / ${hintEls.length}`;
    hintEls[idx]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    hintCurrent = idx;
}

// Re-render spots on resize/orientation change
let resizeTimer;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
        if (hintActive) {
            renderHintSpots();
            highlightHint(hintCurrent);
        }
    }, 150);
});
window.addEventListener('orientationchange', () => {
    setTimeout(() => {
        if (hintActive) {
            renderHintSpots();
            highlightHint(hintCurrent);
        }
    }, 300);
});

hintToggle.addEventListener('click', () => hintActive ? hideHints() : showHints());
veil.addEventListener('click', hideHints);
hintDone.addEventListener('click', hideHints);
hintPrev.addEventListener('click', () => {
    if (hintCurrent > 0) highlightHint(hintCurrent - 1);
});
hintNext.addEventListener('click', () => {
    if (hintCurrent < hintEls.length - 1) highlightHint(hintCurrent + 1);
    else hideHints();
});

// Touch swipe to navigate hints
let touchStartX = 0;
overlay.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].clientX;
}, { passive: true });
overlay.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) < 40) return; // too small
    if (dx < 0 && hintCurrent < hintEls.length - 1) highlightHint(hintCurrent + 1);
    else if (dx > 0 && hintCurrent > 0) highlightHint(hintCurrent - 1);
}, { passive: true });

document.addEventListener('keydown', e => {
    if (!hintActive) return;
    if (e.key === 'Escape')     hideHints();
    if (e.key === 'ArrowRight') hintCurrent < hintEls.length - 1 ? highlightHint(hintCurrent + 1) : hideHints();
    if (e.key === 'ArrowLeft')  hintCurrent > 0 && highlightHint(hintCurrent - 1);
});

// ── Init ─────────────────────────────────────────────────────
function init() {
    attachHelpTooltips();
    initHintButton();
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();

const obs = new MutationObserver(() => { attachHelpTooltips(); initHintButton(); });
obs.observe(document.body, { childList: true, subtree: true });

window.PBHelp = { showHints, hideHints, refreshHints: initHintButton };

})();
</script>
{% endif %}
