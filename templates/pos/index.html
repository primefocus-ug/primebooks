<!-- templates/pos_app/index.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS System</title>
    <link rel="manifest" href="{% static 'manifest.json' %}">
    <link rel="stylesheet" href="{% static 'css/pos.css' %}">
</head>
<body>
    <!-- Connection Status -->
    <div id="connection-status" class="online">Online</div>
    <div id="offline-banner">⚠️ Working offline</div>

    <!-- Your POS UI -->
    <div id="pos-interface">
        <!-- Product selection, cart, checkout, etc. -->
    </div>

    <!-- Load Core Modules -->
    <script type="module">
        // Import all modules
        import dbManager from '{% static "js/db-manager.js" %}';
        import authManager from '{% static "js/auth-manager.js" %}';
        import syncManager from '{% static "js/sync-manager.js" %}';
        import conflictResolver from '{% static "js/conflict-resolver.js" %}';
        import offlineDetector from '{% static "js/offline-detector.js" %}';
        import djangoAPIAdapter from '{% static "js/django-api-adapter.js" %}';

        // Make them globally available
        window.dbManager = dbManager;
        window.authManager = authManager;
        window.syncManager = syncManager;
        window.conflictResolver = conflictResolver;
        window.djangoAPIAdapter = djangoAPIAdapter;

        // Initialize app
        document.addEventListener('DOMContentLoaded', async () => {
            await dbManager.init();
            await authManager.isAuthenticated();
            // Your init code
        });
    </script>

    <!-- Your POS Business Logic -->
    <script type="module" src="{% static 'js/pos-logic.js' %}"></script>
</body>
</html>
