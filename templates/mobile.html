{% load static %}
{% load navigation_tags %}
{% load custom_filters %}

{% if user.is_authenticated %}
<style>
/* Exactly 5 items — enforce equal width, no overflow */
#pbBottomNav {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1035;
    /* left:0 + right:0 is sufficient — explicit width:100vw can exceed the
       visual viewport on pages with a scrollbar, pushing items off-screen. */
    background: var(--bg-primary, #fff);
    border-top: 1px solid var(--border-color, #e5e7eb);
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    padding: 0 0 env(safe-area-inset-bottom, 0);
    height: calc(58px + env(safe-area-inset-bottom, 0));
    align-items: stretch;
    justify-content: space-around;
    font-family: var(--font-family, 'Segoe UI', sans-serif);
    overflow: hidden;
    box-sizing: border-box;
}
[data-theme="dark"] #pbBottomNav {
    background: #0f172a; border-color: rgba(255,255,255,0.07);
    box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
}
@media (max-width: 767px) {
    #pbBottomNav { display: flex; }
    .main-wrapper { padding-bottom: calc(58px + env(safe-area-inset-bottom, 0)) !important; }
    .main-wrapper { margin-left: 0 !important; }
}

.pb-bn-item {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 0.15rem;
    /* Exactly 1/5 of the bar width — no flex overflow */
    flex: 1 1 0; min-width: 0; max-width: 20%;
    padding: 0.4rem 0.1rem 0.3rem;
    color: var(--text-muted, #9ca3af);
    text-decoration: none; cursor: pointer;
    background: none; border: none; font-family: inherit;
    transition: color 0.15s; position: relative;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
}
.pb-bn-item.active { color: var(--primary-600, #2563eb); }
[data-theme="dark"] .pb-bn-item.active { color: #818cf8; }
.pb-bn-item i { font-size: 1.2rem; transition: transform 0.18s; flex-shrink: 0; }
.pb-bn-item:active i { transform: scale(0.85); }
.pb-bn-item span {
    font-size: 0.58rem; font-weight: 600; line-height: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    width: 100%; text-align: center;
}

/* Active indicator bar above icon */
.pb-bn-item.active::before {
    content: ''; position: absolute; top: 0;
    left: 50%; transform: translateX(-50%);
    width: 24px; height: 2px; border-radius: 0 0 2px 2px;
    background: var(--primary-600, #2563eb);
}
[data-theme="dark"] .pb-bn-item.active::before { background: #818cf8; }

/* Badge on notification item */
.pb-bn-badge {
    position: absolute; top: 4px; left: calc(50% + 6px);
    background: #ef4444; color: #fff; border-radius: 50%;
    width: 16px; height: 16px; font-size: 0.58rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--bg-primary, #fff);
}
[data-theme="dark"] .pb-bn-badge { border-color: #0f172a; }

/* ════════════════════════════════════════════
   TOUCH TABLE ROWS — Swipe Left for Actions
   ════════════════════════════════════════════ */
.pb-swipe-row {
    position: relative; overflow: hidden;
    touch-action: pan-y;
    transition: none;
}
.pb-swipe-row td { background: inherit; position: relative; z-index: 1; transition: transform 0.2s ease; }
.pb-swipe-row.swiping td { transition: none; }

.pb-swipe-actions {
    position: absolute; right: 0; top: 0; bottom: 0;
    display: flex; align-items: stretch;
    transform: translateX(100%);
    transition: transform 0.2s ease;
    z-index: 0;
}
.pb-swipe-row.revealed .pb-swipe-actions { transform: translateX(0); }

.pb-swipe-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-width: 64px; padding: 0 0.875rem; gap: 0.2rem;
    color: #fff; font-size: 0.65rem; font-weight: 600; cursor: pointer;
    border: none; font-family: inherit;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
}
.pb-swipe-btn:active { opacity: 0.8; }
.pb-swipe-btn i { font-size: 1.1rem; }
.pb-swipe-btn.edit   { background: #3b82f6; }
.pb-swipe-btn.delete { background: #ef4444; }
.pb-swipe-btn.view   { background: #10b981; }

/* ════════════════════════════════════════════
   MOBILE COMMAND PALETTE — Bottom Sheet
   ════════════════════════════════════════════ */
#pbMobilePalette {
    display: none; position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    /* Use viewport units instead of inset:0 so the palette is always
       anchored to the visible screen, not the document width */
    z-index: 9600;
    flex-direction: column; justify-content: flex-end;
    font-family: var(--font-family, 'Segoe UI', sans-serif);
    box-sizing: border-box;
}
#pbMobilePalette.open {
    display: flex;
    animation: mpBackdropIn 0.2s ease;
}
@keyframes mpBackdropIn { from{opacity:0}to{opacity:1} }
.pb-mp-backdrop {
    position: absolute; top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
}
.pb-mp-sheet {
    position: relative; z-index: 1;
    background: var(--bg-primary, #fff);
    border-radius: 20px 20px 0 0;
    border-top: 1px solid var(--border-color, #e5e7eb);
    max-height: 80vh; display: flex; flex-direction: column;
    box-shadow: 0 -8px 30px rgba(0,0,0,0.15);
    animation: mpSheetIn 0.32s cubic-bezier(0.16,1,0.3,1);
    padding-bottom: env(safe-area-inset-bottom, 0);
}
[data-theme="dark"] .pb-mp-sheet { background:#0f172a; border-color:rgba(255,255,255,0.08); }
@keyframes mpSheetIn { from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1} }

.pb-mp-handle {
    width: 36px; height: 4px; background: var(--border-color, #e5e7eb);
    border-radius: 2px; margin: 0.75rem auto 0;
}
[data-theme="dark"] .pb-mp-handle { background: rgba(255,255,255,0.12); }

.pb-mp-search-row {
    display: flex; align-items: center; gap: 0.75rem;
    margin: 0.75rem 1rem 0.5rem; padding: 0.7rem 1rem;
    background: var(--bg-secondary, #f9fafb);
    border: 1px solid var(--border-color, #e5e7eb);
    border-radius: 12px;
}
[data-theme="dark"] .pb-mp-search-row { background:#1e293b; border-color:rgba(255,255,255,0.08); }
.pb-mp-search-icon { color: var(--text-muted, #9ca3af); font-size: 1rem; }
#pbMpInput {
    flex: 1; background: transparent; border: none; outline: none;
    font-size: 1rem; color: var(--text-primary, #111827); font-family: inherit;
    caret-color: #6366f1;
}
[data-theme="dark"] #pbMpInput { color: #f1f5f9; }
#pbMpInput::placeholder { color: var(--text-muted, #9ca3af); }

.pb-mp-results {
    flex: 1; overflow-y: auto; padding: 0 0.5rem 1rem;
    scrollbar-width: none;
}
.pb-mp-results::-webkit-scrollbar { display: none; }

/* More sheet grouped layout */
.pb-mp-group {
    padding: 0.75rem 0.75rem 0.3rem;
    font-size: 0.67rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--text-muted, #9ca3af);
}
.pb-mp-item {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.7rem 0.75rem; border-radius: 10px;
    cursor: pointer; transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
    text-decoration: none; color: inherit;
}
.pb-mp-item:active, .pb-mp-item:focus { background: rgba(99,102,241,0.08); outline: none; }
.pb-mp-item-icon {
    width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.05rem;
}
/* Icon colour variants */
.pb-mp-item-icon.blue   { background: rgba(59,130,246,0.12);  color: #2563eb; }
.pb-mp-item-icon.green  { background: rgba(16,185,129,0.12);  color: #059669; }
.pb-mp-item-icon.purple { background: rgba(139,92,246,0.12);  color: #7c3aed; }
.pb-mp-item-icon.amber  { background: rgba(245,158,11,0.12);  color: #d97706; }
.pb-mp-item-icon.red    { background: rgba(239,68,68,0.12);   color: #dc2626; }
.pb-mp-item-icon.teal   { background: rgba(20,184,166,0.12);  color: #0d9488; }
.pb-mp-item-icon.indigo { background: rgba(99,102,241,0.12);  color: #4f46e5; }
.pb-mp-item-icon.slate  { background: rgba(100,116,139,0.12); color: #475569; }
[data-theme="dark"] .pb-mp-item-icon.blue   { background: rgba(59,130,246,0.18);  color: #60a5fa; }
[data-theme="dark"] .pb-mp-item-icon.green  { background: rgba(16,185,129,0.18);  color: #34d399; }
[data-theme="dark"] .pb-mp-item-icon.purple { background: rgba(139,92,246,0.18);  color: #a78bfa; }
[data-theme="dark"] .pb-mp-item-icon.amber  { background: rgba(245,158,11,0.18);  color: #fbbf24; }
[data-theme="dark"] .pb-mp-item-icon.red    { background: rgba(239,68,68,0.18);   color: #f87171; }
[data-theme="dark"] .pb-mp-item-icon.teal   { background: rgba(20,184,166,0.18);  color: #2dd4bf; }
[data-theme="dark"] .pb-mp-item-icon.indigo { background: rgba(99,102,241,0.18);  color: #818cf8; }
[data-theme="dark"] .pb-mp-item-icon.slate  { background: rgba(100,116,139,0.18); color: #94a3b8; }

.pb-mp-item-label { font-size: 0.9rem; font-weight: 600; color: var(--text-primary, #111827); }
[data-theme="dark"] .pb-mp-item-label { color: #f1f5f9; }
.pb-mp-item-sub { font-size: 0.75rem; color: var(--text-muted, #6b7280); margin-top: 0.1rem; }
.pb-mp-item-chevron { margin-left: auto; color: var(--text-muted, #9ca3af); font-size: 0.75rem; }

/* 2-column grid for quick actions at top of More sheet */
.pb-mp-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.5rem; padding: 0 0.75rem 0.25rem;
}
.pb-mp-grid-item {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 0.4rem; padding: 0.875rem 0.5rem;
    background: var(--bg-secondary, #f9fafb);
    border: 1px solid var(--border-color, #e5e7eb);
    border-radius: 12px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s, border-color 0.1s;
    text-decoration: none;
}
.pb-mp-grid-item:active { background: rgba(59,130,246,0.08); border-color: #3b82f6; }
[data-theme="dark"] .pb-mp-grid-item { background: #1e293b; border-color: rgba(255,255,255,0.08); }
.pb-mp-grid-item i { font-size: 1.4rem; }
.pb-mp-grid-item span { font-size: 0.72rem; font-weight: 600; color: var(--text-primary, #111827); text-align: center; }
[data-theme="dark"] .pb-mp-grid-item span { color: #f1f5f9; }
/* Quick action icon colours */
.pb-mp-qa-blue   { color: #2563eb; } .pb-mp-qa-green { color: #059669; }
.pb-mp-qa-purple { color: #7c3aed; } .pb-mp-qa-amber { color: #d97706; }
.pb-mp-qa-teal   { color: #0d9488; } .pb-mp-qa-indigo{ color: #4f46e5; }
.pb-mp-qa-red    { color: #dc2626; } .pb-mp-qa-slate { color: #475569; }
[data-theme="dark"] .pb-mp-qa-blue   { color: #60a5fa; }
[data-theme="dark"] .pb-mp-qa-green  { color: #34d399; }
[data-theme="dark"] .pb-mp-qa-purple { color: #a78bfa; }
[data-theme="dark"] .pb-mp-qa-amber  { color: #fbbf24; }
[data-theme="dark"] .pb-mp-qa-teal   { color: #2dd4bf; }
[data-theme="dark"] .pb-mp-qa-indigo { color: #818cf8; }
[data-theme="dark"] .pb-mp-qa-red    { color: #f87171; }
[data-theme="dark"] .pb-mp-qa-slate  { color: #94a3b8; }
</style>

<!-- ══════════ BOTTOM NAVIGATION BAR — 5 fixed tabs ══════════ -->
<nav id="pbBottomNav" aria-label="Mobile navigation">

    <a class="pb-bn-item {% if request.resolver_match.url_name == 'user_dashboard' %}active{% endif %}"
       href="{% url 'user_dashboard' %}">
        <i class="bi bi-grid-1x2-fill"></i>
        <span>Home</span>
    </a>

    <a class="pb-bn-item {% if 'create' in request.path and 'sale' in request.path or 'invoice' in request.path and 'create' in request.path %}active{% endif %}"
       href="{% url 'sales:create_sale' %}" data-nav-exact="1">
        <i class="bi bi-plus-circle-fill"></i>
        <span>New Sale</span>
    </a>

    <a class="pb-bn-item {% if request.path == '/products/' or request.path|slice:':9' == '/products' %}active{% endif %}"
       href="{% url 'inventory:product_list' %}">
        <i class="bi bi-box-seam-fill"></i>
        <span>Products</span>
    </a>

    <a class="pb-bn-item {% if request.path == '/sales/' or 'invoice' in request.path and 'create' not in request.path %}active{% endif %}"
       href="{% url 'sales:sales_list' %}">
        <i class="bi bi-receipt"></i>
        <span>Sales</span>
    </a>

    <button class="pb-bn-item" id="pbMoreBtn">
        <i class="bi bi-grid-3x3-gap-fill"></i>
        <span>More</span>
    </button>

</nav>

<!-- ══════════ MORE SHEET — full-screen bottom sheet ══════════ -->
<div id="pbMobilePalette">
    <div class="pb-mp-backdrop" onclick="window.PBMobile?.closePalette()"></div>
    <div class="pb-mp-sheet">
        <div class="pb-mp-handle"></div>
        <!-- Search -->
        <div class="pb-mp-search-row">
            <i class="bi bi-search pb-mp-search-icon"></i>
            <input id="pbMpInput" type="text" placeholder="Search pages, records…" autocomplete="off">
        </div>
        <div class="pb-mp-results" id="pbMpResults"></div>
    </div>
</div>

<script>
(function(){
'use strict';

// ── Bottom nav active state ───────────────────────────────────
// Use exact match for root paths to avoid e.g. '/' matching everything.
// Falls back to startsWith only for deeper paths (length > 1).
const path = window.location.pathname;
document.querySelectorAll('.pb-bn-item[href]').forEach(item => {
    if (!item.href) return;
    const itemPath = new URL(item.href, location.origin).pathname;
    const exact = item.dataset.navExact === '1';
    const match = itemPath === '/'
        ? path === '/'
        : exact
            ? path === itemPath
            : path === itemPath || path.startsWith(itemPath + '/');
    if (match) item.classList.add('active');
});

// ── More sheet ────────────────────────────────────────────────
const palette   = document.getElementById('pbMobilePalette');
const mpInput   = document.getElementById('pbMpInput');
const mpResults = document.getElementById('pbMpResults');

// ── Navigation data — generated from Django navigation_items ──────
// URLs, names, icons and hierarchy all come from your nav config.
// Edit your navigation config on the backend and this updates automatically.
const SECTIONS = [
    {% for nav_item in navigation_items %}{% if not nav_item.is_divider %}{
        group: "{{ nav_item.name|escapejs }}",
        groupIcon: "{{ nav_item.icon|default:'bi bi-folder'|escapejs }}",
        links: [{% if nav_item.children %}{% for child in nav_item.children %}{% if child.children %}{% for nested in child.children %}{% nav_item_url nested as nested_url %}{% is_active_nav nested.url_name as nested_active %}{ label:"{{ nested.name|escapejs }}", sub:"{{ child.name|escapejs }}", icon:"{{ nested.icon|default:'bi bi-file-earmark'|escapejs }}", url:"{{ nested_url|escapejs }}", active:{% if nested_active %}true{% else %}false{% endif %} },{% endfor %}{% else %}{% nav_item_url child as child_url %}{% is_active_nav child.url_name as child_active %}{ label:"{{ child.name|escapejs }}", sub:"{{ nav_item.name|escapejs }}", icon:"{{ child.icon|default:'bi bi-circle'|escapejs }}", url:"{{ child_url|escapejs }}", active:{% if child_active %}true{% else %}false{% endif %} },{% endif %}{% endfor %}{% else %}{% nav_item_url nav_item as nav_url %}{% is_active_nav nav_item.url_name as nav_active %}{ label:"{{ nav_item.name|escapejs }}", sub:"", icon:"{{ nav_item.icon|default:'bi bi-circle'|escapejs }}", url:"{{ nav_url|escapejs }}", active:{% if nav_active %}true{% else %}false{% endif %} },{% endif %}]
    },{% endif %}{% endfor %}
];

// Flat list for search — spans all sections
const ALL_LINKS = SECTIONS.flatMap(s =>
    s.links.map(l => ({ ...l, group: s.group }))
);

// Quick actions — first 4 leaf links from all sections (most likely to be frequent)
const QUICK_ACTIONS = ALL_LINKS.slice(0, 4);

// Colour palette cycled per section index (no hardcoded colours needed)
const SECTION_COLOURS = ['blue','green','purple','amber','teal','indigo','red','slate'];
const LINK_COLOURS    = ['blue','green','purple','amber','teal','indigo','red','slate'];

// ── Render helpers ────────────────────────────────────────────
function itemHTML(item, colourClass) {
    const col = colourClass || 'slate';
    const sub = [item.group, item.sub].filter(Boolean).join(' · ');
    return `<a class="pb-mp-item" href="${item.url}">
        <div class="pb-mp-item-icon ${col}"><i class="${item.icon}"></i></div>
        <div style="flex:1;min-width:0">
            <div class="pb-mp-item-label">${item.label}</div>
            ${sub ? `<div class="pb-mp-item-sub">${sub}</div>` : ''}
        </div>
        <i class="bi bi-chevron-right pb-mp-item-chevron"></i>
    </a>`;
}

function renderMpDefault() {
    let html = '';

    // Quick actions grid
    if (QUICK_ACTIONS.length) {
        html += '<div class="pb-mp-group">Quick Actions</div><div class="pb-mp-grid">';
        QUICK_ACTIONS.forEach((a, i) => {
            const col = LINK_COLOURS[i % LINK_COLOURS.length];
            html += `<a class="pb-mp-grid-item" href="${a.url}">
                <i class="${a.icon} pb-mp-qa-icon pb-mp-qa-${col}"></i>
                <span>${a.label}</span>
            </a>`;
        });
        html += '</div>';
    }

    // All sections
    SECTIONS.forEach((section, si) => {
        if (!section.links.length) return;
        const sCol = SECTION_COLOURS[si % SECTION_COLOURS.length];
        html += `<div class="pb-mp-group">
            <i class="${section.groupIcon}" style="margin-right:0.3rem;opacity:0.7"></i>${section.group}
        </div>`;
        section.links.forEach((item, li) => {
            const col = LINK_COLOURS[(si + li) % LINK_COLOURS.length];
            html += itemHTML({ ...item, group: '' }, col);
        });
    });

    mpResults.innerHTML = html;
}

function renderMpSearch(q) {
    const matches = ALL_LINKS.filter(item =>
        item.label.toLowerCase().includes(q) ||
        (item.sub ?? '').toLowerCase().includes(q) ||
        item.group.toLowerCase().includes(q)
    );
    if (!matches.length) {
        mpResults.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-muted,#9ca3af);font-size:0.84rem">No results found</div>';
        return;
    }
    let html = `<div class="pb-mp-group">${matches.length} result${matches.length !== 1 ? 's' : ''}</div>`;
    matches.forEach((item, i) => {
        html += itemHTML(item, LINK_COLOURS[i % LINK_COLOURS.length]);
    });
    mpResults.innerHTML = html;
}

// ── Open / close ──────────────────────────────────────────────
function openPalette() {
    palette.classList.add('open');
    requestAnimationFrame(() => requestAnimationFrame(() => {
        renderMpDefault();
        mpInput.focus();
    }));
}

function closePalette() {
    palette.classList.remove('open');
    mpInput.value = '';
}

// Wire More button
document.getElementById('pbMoreBtn')?.addEventListener('click', openPalette);

// Close on backdrop
palette.addEventListener('click', e => {
    if (e.target === palette || e.target.classList.contains('pb-mp-backdrop')) closePalette();
});

// Close when any nav link inside the palette is clicked
palette.addEventListener('click', e => {
    const link = e.target.closest('a[href]');
    if (link) closePalette();
});

// Escape key
document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && palette.classList.contains('open')) closePalette();
});

// Swipe down to close
let mpTouchY = 0;
document.querySelector('.pb-mp-sheet')?.addEventListener('touchstart', e => {
    mpTouchY = e.changedTouches[0].clientY;
}, { passive: true });
document.querySelector('.pb-mp-sheet')?.addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - mpTouchY > 80) closePalette();
}, { passive: true });

// Search input
mpInput.addEventListener('input', () => {
    const q = mpInput.value.trim().toLowerCase();
    if (!q) { renderMpDefault(); return; }
    renderMpSearch(q);
});

// ── Touch Table Rows ──────────────────────────────────────────
function initSwipeRows() {
    document.querySelectorAll('tr[data-shortcut-url], tr[data-shortcut-edit]').forEach(row => {
        if (row._swipeInit || window.innerWidth >= 768) return;
        row._swipeInit = true;
        row.classList.add('pb-swipe-row');

        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'pb-swipe-actions';

        if (row.dataset.shortcutUrl) {
            const btn = document.createElement('button');
            btn.className = 'pb-swipe-btn view';
            btn.innerHTML = '<i class="bi bi-eye"></i><span>View</span>';
            btn.addEventListener('click', () => window.location.href = row.dataset.shortcutUrl);
            actionsDiv.appendChild(btn);
        }
        if (row.dataset.shortcutEdit) {
            const btn = document.createElement('button');
            btn.className = 'pb-swipe-btn edit';
            btn.innerHTML = '<i class="bi bi-pencil"></i><span>Edit</span>';
            btn.addEventListener('click', () => window.location.href = row.dataset.shortcutEdit);
            actionsDiv.appendChild(btn);
        }
        if (row.dataset.shortcutDelete) {
            const btn = document.createElement('button');
            btn.className = 'pb-swipe-btn delete';
            btn.innerHTML = '<i class="bi bi-trash3"></i><span>Delete</span>';
            btn.addEventListener('click', () => {
                if (confirm('Delete this item?')) window.location.href = row.dataset.shortcutDelete;
            });
            actionsDiv.appendChild(btn);
        }

        if (!actionsDiv.children.length) return;
        row.appendChild(actionsDiv);

        let startX = 0, startY = 0, revealed = false;
        row.addEventListener('touchstart', e => {
            startX = e.changedTouches[0].clientX;
            startY = e.changedTouches[0].clientY;
            row.classList.add('swiping');
        }, { passive: true });
        row.addEventListener('touchend', e => {
            row.classList.remove('swiping');
            const dx = e.changedTouches[0].clientX - startX;
            const dy = Math.abs(e.changedTouches[0].clientY - startY);
            if (dy > 30) return;
            if (dx < -50) { revealed = true;  row.classList.add('revealed'); }
            if (dx > 30)  { revealed = false; row.classList.remove('revealed'); }
        }, { passive: true });
        document.addEventListener('touchstart', e => {
            if (revealed && !row.contains(e.target)) {
                revealed = false;
                row.classList.remove('revealed');
            }
        }, { passive: true });
    });
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initSwipeRows);
} else {
    initSwipeRows();
}
document.addEventListener('htmx:afterSwap', initSwipeRows);

// ── Expose ────────────────────────────────────────────────────
window.PBMobile = { openPalette, closePalette, initSwipeRows };

})();
</script>
