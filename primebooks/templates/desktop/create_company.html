
<!-- templates/desktop/create_company.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Company - {{ SITE_NAME }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="mb-0">Create New Company</h3>
                    </div>
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label for="company_name" class="form-label">Company Name *</label>
                                <input type="text"
                                       class="form-control"
                                       id="company_name"
                                       name="company_name"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label for="schema_name" class="form-label">
                                    Schema Name (auto-generated)
                                </label>
                                <input type="text"
                                       class="form-control"
                                       id="schema_name"
                                       name="schema_name"
                                       readonly>
                                <small class="form-text text-muted">
                                    This will be auto-generated from company name
                                </small>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a href="{% url 'primebooks:tenant_selector' %}" class="btn btn-secondary">
                                    Cancel
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    Create Company
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-generate schema name from company name
        document.getElementById('company_name').addEventListener('input', function(e) {
            const schemaName = e.target.value
                .toLowerCase()
                .replace(/[^a-z0-9]/g, '_')
                .replace(/_+/g, '_')
                .replace(/^_|_$/g, '');
            document.getElementById('schema_name').value = schemaName;
        });
    </script>
</body>
</html>
