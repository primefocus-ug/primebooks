<!-- templates/desktop/login.html -->
{% extends "base_desktop.html" %}

{% block title %}Login - PrimeBooks Desktop{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4">🔐 Desktop Login</h2>

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="subdomain" class="form-label">Company Subdomain</label>
                            <input type="text" class="form-control" id="subdomain" name="subdomain"
                                   placeholder="yourcompany" required>
                            <small class="text-muted">Enter your company's subdomain</small>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email"
                                   placeholder="you@example.com" required>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2">
                            Login & Sync
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <small class="text-muted">
                            🌐 Requires internet connection for first login
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
