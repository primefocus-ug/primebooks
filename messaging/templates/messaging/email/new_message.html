<!-- messaging/templates/messaging/email/new_message.html -->

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: #0084ff;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px 8px 0 0;
        }
        .content {
            background: #f9f9f9;
            padding: 30px;
            border-radius: 0 0 8px 8px;
        }
        .button {
            display: inline-block;
            background: #0084ff;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>💬 New Message</h2>
        </div>
        <div class="content">
            <p>Hi {{ user.username }},</p>
            <p><strong>{{ sender.username }}</strong> sent you a message in <strong>{{ conversation_name }}</strong>.</p>
            <p style="color: #666; font-style: italic;">{{ message_preview }}</p>
            <a href="{{ view_url }}" class="button">View Message</a>
            <p style="margin-top: 30px; font-size: 12px; color: #999;">
                You're receiving this email because you have notifications enabled for this conversation.
            </p>
        </div>
    </div>
</body>
</html>
