{% load static %}

{% if enabled %}
<span class="badge efris-status-badge 
    {% if active and registered %}bg-success
    {% elif active %}bg-warning
    {% elif enabled %}bg-info
    {% else %}bg-secondary{% endif %}">
    <i class="fas fa-sync-alt me-1"></i>
    {{ status_display }}
</span>
{% else %}
<span class="badge bg-secondary efris-status-badge">
    <i class="fas fa-times-circle me-1"></i>
    EFRIS Disabled
</span>
{% endif %}
