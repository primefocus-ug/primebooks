<!-- templates/public_router/login_bridge.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="2;url={{ tenant_url }}">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .redirect-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .tenant-name {
            color: #667eea;
            font-weight: bold;
            font-size: 1.2em;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="redirect-box">
        <h2>Redirecting to your workspace</h2>
        <div class="spinner"></div>
        <p class="tenant-name">{{ tenant_name }}</p>
        <p style="color: #666; font-size: 0.9em;">
            If you are not redirected automatically,
            <a href="{{ tenant_url }}" style="color: #667eea;">click here</a>
        </p>
    </div>

    <script>
        // Immediate redirect
        setTimeout(function() {
            window.location.href = '{{ tenant_url }}';
        }, 1000);
    </script>
</body>
</html>
