<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIMEBOOKS - Sales Portal Login/Trial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background-color: #000000;
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh; /* Ensure full height for background */
            display: flex;
            flex-direction: column;
        }

        /* Navigation Bar */
        .navbar {
            background-color: #000000;
            padding: 1rem 2rem;
            border-bottom: 1px solid #1a1a1a;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
        }

        .logo img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
            list-style: none;
            align-items: center;
        }

        .nav-menu a {
            color: #999999;
            text-decoration: none;
            transition: color 0.3s;
            font-size: 0.95rem;
        }

        .nav-menu a:hover {
            color: #ffffff;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .btn-secondary {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #333333;
        }

        .btn-secondary:hover {
            background-color: #1a1a1a;
        }

        .btn-primary {
            background-color: #ffffff;
            color: #000000;
        }

        .btn-primary:hover {
            background-color: #e6e6e6;
        }

        /* Announcement Banner */
        .announcement {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 0.75rem 2rem;
            text-align: center;
            font-size: 0.9rem;
        }

        .announcement span {
            margin-left: 0.5rem;
        }

        /* Hero Section (Re-purposed for Sales Portal) */
        .hero {
            flex-grow: 1; /* Allows it to take up available space */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4rem 2rem;
            background-color: #0a0a0a; /* Slightly different background for focus */
        }
        
        /* The main container for the Sign In/Trial Box */
        .portal-container {
            max-width: 450px;
            width: 100%;
            background-color: #000000;
            padding: 3rem;
            border-radius: 16px;
            border: 1px solid #1a1a1a;
            text-align: center;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.2);
        }

        .portal-container h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }

        .portal-container p {
            color: #999999;
            margin-bottom: 2rem;
        }

        /* Re-used Form Styles from landing.html's modal CSS */
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #cccccc;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem;
            background-color: #0a0a0a; /* Darker input for better contrast */
            border: 1px solid #333333;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .portal-link {
            display: block;
            margin-top: 1.5rem;
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .portal-link:hover {
            color: #764ba2;
        }

        /* Button to mimic modal submit button style */
        .btn-portal-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-portal-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }

        /* Footer */
        .footer {
            background-color: #000000;
            padding: 2rem 2rem;
            border-top: 1px solid #1a1a1a;
            text-align: center;
        }

        .footer-bottom {
            color: #666666;
            font-size: 0.9rem;
        }
        
        /* Responsive adjustments for the portal */
        @media (max-width: 768px) {
            .portal-container {
                padding: 2rem;
                margin: 0 1rem;
            }
            .portal-container h2 {
                font-size: 1.5rem;
            }
        }

    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="landing.html" class="logo">
                <img src="logo.png" alt="PrimeBooks Logo">
                <span>PRIMEBOOKS</span>
            </a>
            <div class="nav-buttons">
                <a href="about.html" class="btn btn-secondary">Contact Support</a>
            </div>
        </div>
    </nav>

    <main class="hero">
        <div class="portal-container">
            <h2>Welcome Back to PRIMEBOOKS</h2>
            <p>Sign in to manage your business or start your 60-day free trial.</p>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="btn-portal-submit">Sign In to My Account</button>
            </form>
            
            <a href="#" class="portal-link">Forgot Password?</a>
            <p style="margin-top: 2rem; color: #cccccc;">— OR —</p>
            <a href="#" class="btn btn-primary btn-large" style="width: 100%; margin-top: 1rem;">Start Your Free Trial Now</a>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2024 PRIMEBOOKS. All rights reserved. | <a href="landing.html" class="portal-link" style="display: inline;">Back to Homepage</a></p>
        </div>
    </footer>
</body>
</html>
