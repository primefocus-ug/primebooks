{% extends 'public_router/base.html' %}

{% block title %}Creating Your Workspace...{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body text-center">
                    <div id="statusContainer">
                        <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <h4 id="statusText">Creating your workspace...</h4>
                        <p class="text-muted" id="statusDetail">This usually takes 30-60 seconds</p>

                        <div class="progress mt-4" style="height: 25px;">
                            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated"
                                 role="progressbar" style="width: 25%"></div>
                        </div>
                    </div>

                    <div id="errorContainer" class="d-none">
                        <i class="bi bi-exclamation-circle text-danger" style="font-size: 3rem;"></i>
                        <h4 class="text-danger mt-3">Oops! Something went wrong</h4>
                        <p id="errorMessage" class="text-muted"></p>
                        <a href="{% url 'public_router:signup' %}" class="btn btn-primary">Try Again</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let checkInterval;
let progressValue = 25;

function checkStatus() {
    fetch('/signup/check-status/')
        .then(response => response.json())
        .then(data => {
            console.log('Status:', data.status);

            // Update progress bar
            if (data.status === 'PROCESSING') {
                progressValue = Math.min(progressValue + 5, 90);
                document.getElementById('progressBar').style.width = progressValue + '%';
                document.getElementById('statusText').textContent = 'Setting up your workspace...';
                document.getElementById('statusDetail').textContent = 'Almost there!';
            }

            if (data.status === 'COMPLETED') {
                clearInterval(checkInterval);
                document.getElementById('progressBar').style.width = '100%';
                document.getElementById('progressBar').classList.remove('progress-bar-animated');
                document.getElementById('statusText').textContent = 'Success! Redirecting...';
                document.getElementById('statusDetail').textContent = `Welcome to ${data.company_name}!`;

                // Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = data.redirect_url;
                }, 2000);
            }

            if (data.status === 'FAILED') {
                clearInterval(checkInterval);
                document.getElementById('statusContainer').classList.add('d-none');
                document.getElementById('errorContainer').classList.remove('d-none');
                document.getElementById('errorMessage').textContent = data.error_message || 'Unknown error';
            }
        })
        .catch(error => {
            console.error('Error checking status:', error);
        });
}

// Start checking status every 2 seconds
checkInterval = setInterval(checkStatus, 2000);

// Initial check
checkStatus();

// Stop checking after 5 minutes (timeout)
setTimeout(() => {
    clearInterval(checkInterval);
    if (document.getElementById('statusContainer').classList.contains('d-none') === false) {
        document.getElementById('statusContainer').classList.add('d-none');
        document.getElementById('errorContainer').classList.remove('d-none');
        document.getElementById('errorMessage').textContent = 'Setup is taking longer than expected. Please contact support.';
    }
}, 300000);
</script>
{% endblock %}
