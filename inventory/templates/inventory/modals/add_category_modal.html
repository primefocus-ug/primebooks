<div class="modal fade" id="addCategoryModal" tabindex="-1" aria-labelledby="addCategoryModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addCategoryModalLabel">
                    <i class="fas fa-tags"></i> Add New Category
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="categoryQuickForm">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="categoryType" class="form-label">
                            Category Type <span class="text-danger">*</span>
                        </label>
                        <select class="form-select" id="categoryType" name="category_type" required>
                            <option value="">Select type...</option>
                            <option value="product">🛍️ Product Category</option>
                            <option value="service">⚙️ Service Category</option>
                        </select>
                        <small class="form-text text-muted">
                            Select whether this category is for products or services
                        </small>
                    </div>

                    <div class="mb-3">
                        <label for="categoryName" class="form-label">
                            Category Name <span class="text-danger">*</span>
                        </label>
                        <input type="text"
                               class="form-control"
                               id="categoryName"
                               name="name"
                               placeholder="e.g., Electronics, Cleaning Services"
                               required>
                    </div>

                    <div class="mb-3">
                        <label for="categoryCode" class="form-label">Category Code</label>
                        <div class="input-group">
                            <input type="text"
                                   class="form-control"
                                   id="categoryCode"
                                   name="code"
                                   placeholder="Optional internal code">
                            <button type="button"
                                    class="btn btn-outline-secondary"
                                    id="generateCategoryCodeModal"
                                    title="Generate Code">
                                <i class="fas fa-magic"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="categoryDescription" class="form-label">Description</label>
                        <textarea class="form-control"
                                  id="categoryDescription"
                                  name="description"
                                  rows="3"
                                  placeholder="Optional category description"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="fas fa-times"></i> Close
                </button>
                <button type="button" class="btn btn-primary" onclick="saveCategory()">
                    <i class="fas fa-save"></i> Save Category
                </button>
            </div>
        </div>
    </div>
</div>
