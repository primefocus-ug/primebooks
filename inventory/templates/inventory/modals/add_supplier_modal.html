<div class="modal fade" id="addSupplierModal" tabindex="-1" aria-labelledby="addSupplierModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addSupplierModalLabel">
                    <i class="fas fa-truck"></i> Add New Supplier
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="supplierQuickForm">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="supplierName" class="form-label">
                            Supplier Name <span class="text-danger">*</span>
                        </label>
                        <input type="text"
                               class="form-control"
                               id="supplierName"
                               name="name"
                               placeholder="Enter supplier name"
                               required>
                    </div>

                    <div class="mb-3">
                        <label for="supplierTin" class="form-label">TIN</label>
                        <input type="text"
                               class="form-control"
                               id="supplierTin"
                               name="tin"
                               placeholder="Tax Identification Number">
                    </div>

                    <div class="mb-3">
                        <label for="supplierPhone" class="form-label">
                            Phone <span class="text-danger">*</span>
                        </label>
                        <input type="text"
                               class="form-control"
                               id="supplierPhone"
                               name="phone"
                               placeholder="Contact phone number"
                               required>
                    </div>

                    <div class="mb-3">
                        <label for="supplierEmail" class="form-label">Email</label>
                        <input type="email"
                               class="form-control"
                               id="supplierEmail"
                               name="email"
                               placeholder="contact@supplier.com">
                    </div>

                    <div class="mb-3">
                        <label for="supplierCountry" class="form-label">Country</label>
                        <input type="text"
                               class="form-control"
                               id="supplierCountry"
                               name="country"
                               placeholder="Country">
                    </div>

                    <div class="mb-3">
                        <label for="supplierAddress" class="form-label">Address</label>
                        <textarea class="form-control"
                                  id="supplierAddress"
                                  name="address"
                                  rows="2"
                                  placeholder="Full address"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="fas fa-times"></i> Close
                </button>
                <button type="button" class="btn btn-primary" onclick="saveSupplier()">
                    <i class="fas fa-save"></i> Save Supplier
                </button>
            </div>
        </div>
    </div>
</div>
