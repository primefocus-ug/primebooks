{% load crispy_forms_tags %}

<div class="tab-pane fade" id="efris" role="tabpanel">
    <div class="mb-4">
        <div class="form-check form-switch">
            {{ form.efris_enabled }}
            <label class="form-check-label" for="{{ form.efris_enabled.id_for_label }}">
                {{ form.efris_enabled.label }}
            </label>
        </div>
        {% if form.efris_enabled.help_text %}
            <small class="form-text text-muted">{{ form.efris_enabled.help_text }}</small>
        {% endif %}
    </div>
    
    <div id="efris-fields" style="display: none;">
        {{ form.efris_client_id|as_crispy_field }}
        {{ form.efris_device_number|as_crispy_field }}
    </div>
</div>
