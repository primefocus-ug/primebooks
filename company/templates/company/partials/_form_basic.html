{% load crispy_forms_tags %}

<div class="tab-pane fade show active" id="basic" role="tabpanel">
    <div class="row">
        <div class="col-md-6">
            {{ form.name|as_crispy_field }}
        </div>
        <div class="col-md-6">
            {{ form.trading_name|as_crispy_field }}
        </div>
    </div>
    
    
    {{ form.logo|as_crispy_field }}
    {% if object.logo %}
        <div class="mt-2">
            <img src="{{ object.logo.url }}" alt="Current logo" class="rounded" style="max-width: 100px; max-height: 100px;">
        </div>
    {% endif %}
</div>
