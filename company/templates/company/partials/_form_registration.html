{% load crispy_forms_tags %}

<div class="tab-pane fade" id="registration" role="tabpanel">
    <div class="row">
        <div class="col-md-6">
            {{ form.tin|as_crispy_field }}
        </div>
        <div class="col-md-6">
            {{ form.brn|as_crispy_field }}
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-6">
            {{ form.nin|as_crispy_field }}
        </div>
        <div class="col-md-6">
            {{ form.vat_registration_number|as_crispy_field }}
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-6">
            {{ form.vat_registration_date|as_crispy_field }}
        </div>
        <div class="col-md-6">
            {{ form.preferred_currency|as_crispy_field }}
        </div>
    </div>
</div>
