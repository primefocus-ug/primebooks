{% extends "base.html" %}
{% load static %}
{% block title %}Manage Company Action{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-light">
            <h4 class="mb-0">Manage Company Action</h4>
        </div>
        <div class="card-body">
            <p><strong>Company:</strong> {{ company.name }}</p>
            <p><strong>Status:</strong> {{ company.get_status_display }}</p>

            <form method="post" class="mt-3">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="action" class="form-label">Select Action</label>
                    <select id="action" name="action" class="form-select" required>
                        <option value="" selected disabled>-- Choose an Action --</option>
                        <option value="activate">Activate</option>
                        <option value="deactivate">Deactivate</option>
                        <option value="suspend">Suspend</option>
                        <option value="archive">Archive</option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Confirm Action</button>
                    <a href="{% url 'companies:company_detail' company.company_id %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
