{% extends "base.html" %}
{% load custom_filters %}
{% load static %}
{% block content %}
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
    {% if perms.invoices.view_invoice %}
    <a href="{% url 'invoice_list' %}">Cancel</a>
    {% endif %}
</form>
{% endblock %}
