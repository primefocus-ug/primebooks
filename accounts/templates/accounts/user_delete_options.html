{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full bg-white shadow-lg rounded-lg p-6">
    <h2 class="text-2xl font-bold text-gray-800 mb-4 text-center">Manage User</h2>
    <p class="text-gray-600 mb-6 text-center">
      What would you like to do with <span class="font-semibold">{{ object.get_full_name }}</span>?
    </p>

    <form method="post" class="space-y-4">
      {% csrf_token %}
      <button
        type="submit"
        name="action"
        value="deactivate"
        class="w-full py-2 px-4 bg-yellow-500 hover:bg-yellow-600 text-white font-semibold rounded-lg transition duration-200">
        Deactivate User
      </button>

      <button
        type="submit"
        name="action"
        value="delete"
        class="w-full py-2 px-4 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition duration-200">
        Delete Permanently
      </button>
      {% if perms.accounts.view_customuser %}

      <a href="{% url 'user_list' %}"
         class="block w-full text-center py-2 px-4 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition duration-200">
         Cancel
      </a>
      {% endif %}
    </form>
  </div>
</div>
{% endblock %}
