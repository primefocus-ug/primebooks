<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Dashboard — PrimeBooks SaaS</title>
{% load static %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#6366f1;--brand2:#4f46e5;--success:#10b981;--warn:#f59e0b;--danger:#ef4444;
  --bg:#0f172a;--surface:#1e293b;--surface2:#273548;--border:rgba(255,255,255,.08);
  --text:#f1f5f9;--muted:#94a3b8;--radius:12px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* ── Top bar ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0;}
.topbar-logo{font-weight:800;font-size:1rem;color:var(--text);}
.topbar-logo span{color:var(--brand);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.tb-badge{background:var(--danger);color:#fff;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:20px;display:none;}
select.tb-tenant{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:.82rem;outline:none;cursor:pointer;}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#6b7280;display:inline-block;transition:background .3s;}
.conn-dot.on{background:var(--success);}
.conn-dot.off{background:var(--danger);}

/* ── Main layout ── */
.main{display:grid;grid-template-columns:320px 1fr;flex:1;overflow:hidden;}

/* ── Session sidebar ── */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-hdr{padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sidebar-hdr h3{font-size:.85rem;font-weight:700;color:var(--text);margin-bottom:8px;}
.sw-search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:.82rem;color:var(--text);outline:none;}
.sw-search:focus{border-color:var(--brand);}
.sw-search::placeholder{color:var(--muted);}
.session-list{flex:1;overflow-y:auto;}
.sess-item{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;position:relative;}
.sess-item:hover{background:var(--surface2);}
.sess-item.active{background:rgba(99,102,241,.15);border-left:3px solid var(--brand);}
.sess-item.has-unread::after{content:'';position:absolute;right:10px;top:50%;transform:translateY(-50%);width:8px;height:8px;background:var(--brand);border-radius:50%;}
.sess-name{font-weight:700;font-size:.85rem;color:var(--text);display:flex;align-items:center;gap:6px;}
.sess-email{font-size:.73rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sess-preview{font-size:.73rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic;}
.sess-meta{display:flex;align-items:center;gap:6px;margin-top:5px;}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:.62rem;font-weight:700;text-transform:uppercase;}
.badge.faq,.badge.onboarding{background:rgba(148,163,184,.15);color:var(--muted);}
.badge.chatting{background:rgba(16,185,129,.15);color:var(--success);}
.badge.escalated{background:rgba(245,158,11,.15);color:var(--warn);}
.badge.in_call{background:rgba(99,102,241,.15);color:var(--brand);}
.badge.resolved{background:rgba(107,114,128,.15);color:#6b7280;}
.tenant-tag{font-size:.62rem;color:var(--brand);font-weight:600;background:rgba(99,102,241,.1);padding:2px 6px;border-radius:4px;}
.sess-time{font-size:.65rem;color:var(--muted);margin-left:auto;}
.unread-num{background:var(--danger);color:#fff;font-size:.6rem;font-weight:700;padding:1px 5px;border-radius:10px;}
.sess-empty{padding:40px 16px;text-align:center;color:var(--muted);}
.sess-empty i{font-size:2rem;display:block;margin-bottom:10px;opacity:.3;}

/* ── Chat pane ── */
.chat-pane{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.chat-hdr{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--surface);}
.chat-hdr-info{flex:1;min-width:0;}
.chat-hdr-name{font-weight:800;font-size:.95rem;color:var(--text);}
.chat-hdr-sub{font-size:.75rem;color:var(--muted);}
.hdr-btns{display:flex;gap:8px;}
.hbtn{padding:7px 13px;border-radius:8px;border:none;cursor:pointer;font-size:.78rem;font-weight:700;font-family:inherit;transition:opacity .15s;display:inline-flex;align-items:center;gap:5px;}
.hbtn:hover{opacity:.82;}
.hbtn-call{background:var(--success);color:#fff;}
.hbtn-resolve{background:var(--warn);color:#fff;}

.messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px;}
.msg{max-width:76%;padding:9px 13px;border-radius:12px;font-size:.85rem;line-height:1.55;word-break:break-word;}
.msg.visitor{background:var(--brand);color:#fff;align-self:flex-start;border-bottom-left-radius:4px;}
.msg.agent{background:var(--surface);color:var(--text);align-self:flex-end;border:1px solid var(--border);border-bottom-right-radius:4px;}
.msg.bot{background:var(--surface2);color:var(--text);align-self:flex-start;border:1px dashed var(--border);}
.msg.system{background:rgba(245,158,11,.1);color:var(--warn);align-self:center;font-size:.76rem;border-radius:8px;max-width:100%;text-align:center;padding:6px 14px;}
.msg-meta{font-size:.67rem;margin-top:3px;opacity:.65;}

.typing-bar{font-size:.74rem;color:var(--muted);padding:4px 20px;min-height:20px;flex-shrink:0;}

.chat-footer{padding:10px 14px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
.chat-footer textarea{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:.87rem;resize:none;max-height:120px;font-family:inherit;outline:none;color:var(--text);line-height:1.5;}
.chat-footer textarea:focus{border-color:var(--brand);}
.send-btn{width:40px;height:40px;background:var(--brand);border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
.send-btn:hover{background:var(--brand2);}
.send-btn i{color:#fff;font-size:1rem;}

.placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:12px;}
.placeholder i{font-size:3rem;opacity:.2;}
.placeholder p{font-size:.88rem;}

/* ── Toast ── */
#toasts{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--surface);color:var(--text);padding:11px 16px;border-radius:10px;font-size:.83rem;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:ti .3s ease;cursor:pointer;pointer-events:all;max-width:300px;border-left:4px solid var(--brand);}
.toast.warn{border-left-color:var(--warn);}
@keyframes ti{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* ── Mobile responsive ── */
@media(max-width:768px){
  body{overflow:auto;}
  .main{grid-template-columns:1fr;overflow:visible;}
  .sidebar{height:auto;max-height:45vh;border-right:none;border-bottom:1px solid var(--border);}
  .session-list{max-height:calc(45vh - 80px);}
  .chat-pane{height:55vh;min-height:400px;}
  .topbar{padding:10px 12px;flex-wrap:wrap;gap:8px;}
  .topbar-right{flex-wrap:wrap;gap:8px;}
  select.tb-tenant{font-size:.75rem;padding:4px 8px;}
  .hdr-btns{flex-wrap:wrap;gap:6px;}
  .hbtn{padding:6px 10px;font-size:.74rem;}
  .messages{padding:10px 12px;}
  .msg{max-width:90%;}
  .chat-footer{padding:8px 10px;}
  .chat-hdr{padding:10px 12px;}
  /* Mobile sidebar toggle */
  .sidebar.mob-hidden{display:none;}
  .mob-back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--brand);
    font-size:.82rem;font-weight:700;cursor:pointer;padding:0;margin-bottom:4px;}
}
@media(max-width:480px){
  .topbar-logo{font-size:.88rem;}
  .main{grid-template-columns:1fr;}
  .msg{max-width:95%;}
  .sess-item{padding:9px 11px;}
}
</style>
</head>
<body>
<div id="toasts"></div>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-logo">PrimeBooks <span>Support</span></div>
  <span class="conn-dot" id="conn-dot" title="WebSocket status"></span>
  <span id="conn-label" style="font-size:.75rem;color:var(--muted)">Connecting…</span>
  <div class="topbar-right">
    <span style="font-size:.78rem;color:var(--muted)">Tenant:</span>
    <select class="tb-tenant" id="tenant-select">
      <option value="">All tenants</option>
      {% for t in tenants %}
      <option value="{{ t.schema_name }}">{{ t.name }}</option>
      {% endfor %}
    </select>
    <span class="tb-badge" id="unread-pill">0</span>
    <span style="font-size:.8rem;color:var(--muted)">{{ user.get_full_name|default:user.username }}</span>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-hdr">
      <h3><i class="bi bi-headset"></i> Active Sessions</h3>
      <input type="text" class="sw-search" id="search" placeholder="Search name, email…">
    </div>
    <div class="session-list" id="session-list">
      <div class="sess-empty"><i class="bi bi-chat-dots"></i>Loading sessions…</div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-pane" id="chat-pane">
    <div class="placeholder">
      <i class="bi bi-chat-left-text"></i>
      <p>Select a session to start chatting</p>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
const WS   = location.protocol==='https:'?'wss':'ws';
const CSRF = '{{ csrf_token }}';

let curSchema=null, curToken=null, chatWS=null;
let allSessions=[], unread=new Set();
let typingTmr=null;

const dot     = document.getElementById('conn-dot');
const connLbl = document.getElementById('conn-label');
const pill    = document.getElementById('unread-pill');
const sList   = document.getElementById('session-list');
const pane    = document.getElementById('chat-pane');
const srch    = document.getElementById('search');
const tSelect = document.getElementById('tenant-select');

// ── Tenant filter ─────────────────────────────────────────────────────
tSelect.addEventListener('change', loadSessions);
srch.addEventListener('input', ()=>renderList(allSessions));

// ── Session polling ───────────────────────────────────────────────────
loadSessions();
setInterval(loadSessions, 5000);

async function loadSessions(){
  const schema = tSelect.value;
  const url    = schema ? `/saas-support/api/sessions/?schema=${schema}` : '/saas-support/api/sessions/';
  const r = await api(url);
  if(!r||!r.sessions) return;
  allSessions = r.sessions;
  renderList(allSessions);
  updatePill();
}

function renderList(sessions){
  const q=(srch.value||'').toLowerCase();
  const f=q?sessions.filter(s=>
    s.name.toLowerCase().includes(q)||(s.email||'').toLowerCase().includes(q)||
    s.tenant_name.toLowerCase().includes(q)
  ):sessions;

  if(!f.length){
    sList.innerHTML='<div class="sess-empty"><i class="bi bi-chat-dots"></i>No active sessions</div>';
    return;
  }
  sList.innerHTML=f.map(s=>`
    <div class="sess-item${(curToken===s.token&&curSchema===s.schema)?' active':''}${(unread.has(s.token)||s.unread_count>0)?' has-unread':''}"
         data-t="${s.token}" data-s="${s.schema}">
      <div class="sess-name">
        ${esc(s.name)}
        ${s.unread_count>0?`<span class="unread-num">${s.unread_count}</span>`:''}
      </div>
      <div class="sess-email">${esc(s.email||'No email')}</div>
      ${s.last_message?`<div class="sess-preview">${esc(s.last_message)}</div>`:''}
      <div class="sess-meta">
        <span class="badge ${s.status}">${s.status}</span>
        <span class="tenant-tag">${esc(s.tenant_name)}</span>
        <span class="sess-time">${ago(s.updated)}</span>
      </div>
    </div>`).join('');

  sList.querySelectorAll('.sess-item').forEach(el=>{
    el.addEventListener('click',()=>openSession(el.dataset.s, el.dataset.t));
  });
}

function updatePill(){
  const n=allSessions.reduce((a,s)=>a+(s.unread_count||0),0);
  pill.textContent=n>99?'99+':n;
  pill.style.display=n?'inline':'none';
  document.title=n?`(${n}) Support Dashboard — PrimeBooks`:'Support Dashboard — PrimeBooks';
}

// ── Open session ──────────────────────────────────────────────────────
async function openSession(schema, token){
  curSchema=schema; curToken=token;
  unread.delete(token);
  if(chatWS){chatWS.close();chatWS=null;}

  const r=await api(`/saas-support/api/session/${schema}/${token}/messages/`);
  if(!r||r.error){toast('Failed to load session: '+(r&&r.error||'Unknown error'));return;}

  // On mobile: hide sidebar, show chat pane, reveal back button
  if(window.innerWidth<=768){
    document.querySelector('.sidebar').classList.add('mob-hidden');
    setTimeout(()=>{
      const mb=document.getElementById('mob-back');
      if(mb) mb.style.display='flex';
    },50);
  }
  buildChatPane(r.session);
  r.messages.forEach(m=>addMsg(m.sender,m.body,m.timestamp,m.agent_name,true));
  const msgs=document.getElementById('msgs');
  if(msgs)msgs.scrollTop=msgs.scrollHeight;

  connectChatWS(token);
  renderList(allSessions);
}

function buildChatPane(session){
  pane.innerHTML=`
    <div class="chat-hdr">
      <div class="chat-hdr-info">
        <div class="chat-hdr-name">${esc(session.name)}</div>
        <div class="chat-hdr-sub">${esc(session.email||'No email')} · <span class="tenant-tag" style="font-size:.72rem">${esc(session.schema||'')}</span> · <span class="badge ${session.status}">${session.status}</span></div>
      </div>
      <div class="hdr-btns">
        <button class="mob-back-btn" id="mob-back" style="display:none" onclick="mobileSidebarBack()">← Sessions</button>
        <button class="hbtn hbtn-resolve" id="resolve-btn">✅ Resolve</button>
      </div>
    </div>
    <div class="messages" id="msgs"></div>
    <div class="typing-bar" id="typing"></div>
    <div class="chat-footer">
      <textarea id="agent-inp" placeholder="Reply as support agent… (Enter to send)" rows="1"></textarea>
      <button class="send-btn" id="send-btn"><i class="bi bi-send-fill"></i></button>
    </div>`;

  document.getElementById('send-btn').onclick=sendMsg;
  document.getElementById('resolve-btn').onclick=()=>resolveSession(curSchema,curToken);
  const inp=document.getElementById('agent-inp');
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
    else if(chatWS&&chatWS.readyState===1){
      chatWS.send(JSON.stringify({type:'typing',sender:'agent'}));
    }
  });
  inp.addEventListener('input',()=>{
    inp.style.height='auto';
    inp.style.height=Math.min(inp.scrollHeight,120)+'px';
  });
}

// ── Chat WebSocket ─────────────────────────────────────────────────────
function connectChatWS(token){
  chatWS=new WebSocket(`${WS}://${location.host}/ws/support/${token}/`);
  chatWS.onopen=()=>{setDot(true);};
  chatWS.onclose=()=>{setDot(false);};
  chatWS.onmessage=evt=>{
    let d;try{d=JSON.parse(evt.data);}catch(_){return;}
    if(d.type==='chat_message'){
      // Skip agent's own messages — already appended in sendMsg() for instant feedback
      if(d.sender==='agent') return;
      addMsg(d.sender,d.body,d.timestamp);
      if(d.sender==='visitor'){
        loadSessions();
        ping();
        notify('💬 New message', d.body, curToken);
        flashTitle('💬 New message — Support Dashboard');
      }
    } else if(d.type==='typing'&&d.sender==='visitor'){
      showTyping('Visitor is typing…');
    }
  };
}

// ── Send message ───────────────────────────────────────────────────────
async function sendMsg(){
  const inp=document.getElementById('agent-inp');
  if(!inp)return;
  const txt=inp.value.trim();
  if(!txt)return;
  inp.value='';inp.style.height='auto';

  // Send via REST (more reliable than WS for agent replies)
  const r=await api(`/saas-support/api/session/${curSchema}/${curToken}/message/`,'POST',{body:txt});
  if(!r||r.error){toast('Failed to send: '+(r&&r.error||'Error'));return;}
  // Append immediately for instant feedback — WS echo is suppressed for 'agent' sender
  addMsg('agent', txt, r.timestamp);
}

function addMsg(sender,body,ts,agentName,isHist){
  const a=document.getElementById('msgs');if(!a)return;
  const d=document.createElement('div');d.className='msg '+sender;
  const b=document.createElement('div');b.textContent=body;d.appendChild(b);
  if(ts){
    const m=document.createElement('div');m.className='msg-meta';
    m.textContent=(agentName?agentName+' · ':'')+new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    d.appendChild(m);
  }
  a.appendChild(d);
  if(!isHist)a.scrollTop=a.scrollHeight;
}
function showTyping(t){
  const e=document.getElementById('typing');if(e)e.textContent=t;
  clearTimeout(typingTmr);typingTmr=setTimeout(()=>{const e=document.getElementById('typing');if(e)e.textContent='';},2500);
}

// ── Resolve ────────────────────────────────────────────────────────────
async function resolveSession(schema,token){
  if(!confirm('Resolve this session?'))return;
  const r=await api(`/saas-support/api/session/${schema}/${token}/resolve/`,'POST');
  if(r&&r.ok){
    toast('✅ Session resolved');
    pane.innerHTML='<div class="placeholder"><i class="bi bi-check-circle"></i><p>Session resolved</p></div>';
    curToken=null;curSchema=null;
    if(chatWS){chatWS.close();chatWS=null;}
    loadSessions();
  }
}

// ── Utils ──────────────────────────────────────────────────────────────
async function api(url,method='GET',body=null){
  try{
    const o={method,headers:{'Content-Type':'application/json','X-CSRFToken':CSRF}};
    if(body)o.body=JSON.stringify(body);
    return(await fetch(url,o)).json();
  }catch(e){console.error(e);return null;}
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ago(iso){
  if(!iso)return'';
  const d=Math.floor((Date.now()-new Date(iso))/1000);
  if(d<60)return d+'s ago';if(d<3600)return Math.floor(d/60)+'m ago';
  if(d<86400)return Math.floor(d/3600)+'h ago';return new Date(iso).toLocaleDateString();
}
function setDot(on){dot.className='conn-dot'+(on?' on':' off');connLbl.textContent=on?'Connected':'Disconnected';}
function toast(msg,type){
  const a=document.getElementById('toasts');
  const t=document.createElement('div');t.className='toast'+(type?' '+type:'');t.textContent=msg;
  a.appendChild(t);setTimeout(()=>t.remove(),5000);
}
function ping(){
  try{const c=new(window.AudioContext||window.webkitAudioContext)();
    const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
    o.type='sine';o.frequency.setValueAtTime(880,c.currentTime);o.frequency.exponentialRampToValueAtTime(440,c.currentTime+0.15);
    g.gain.setValueAtTime(0.2,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.35);
    o.start(c.currentTime);o.stop(c.currentTime+0.35);}catch(_){}
}
function notify(title, body, token){
  if(!('Notification'in window))return;
  const show = () => {
    const n = new Notification('PrimeBooks Support — '+title,{
      body: (body||'').substring(0,80),
      tag: 'support-'+token,  // group per session so they don't pile up
    });
    n.onclick = () => { window.focus(); n.close(); };
  };
  if(Notification.permission==='granted') show();
  else if(Notification.permission!=='denied') Notification.requestPermission().then(p=>{ if(p==='granted') show(); });
}

let _flashTmr = null;
function flashTitle(msg){
  document.title = msg;
  clearTimeout(_flashTmr);
  _flashTmr = setInterval(()=>{
    document.title = document.title === msg ? 'Support Dashboard — PrimeBooks' : msg;
  }, 1200);
  // Stop flashing when tab gains focus
  window.addEventListener('focus', ()=>{
    clearInterval(_flashTmr);
    document.title = 'Support Dashboard — PrimeBooks';
  }, { once: true });
}

function mobileSidebarBack(){
  document.querySelector('.sidebar').classList.remove('mob-hidden');
  document.querySelector('.chat-pane').style.display='none';
  // reset after short delay so CSS transition works
  setTimeout(()=>{ document.querySelector('.chat-pane').style.display=''; }, 10);
}

if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();
setDot(false);
})();
</script>
</body>
</html>
