<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | PRIMEBOOKS Analytics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #000;
            --bg-secondary: #1a1a1a;
            --text-primary: #fff;
            --text-secondary: #aaa;
            --border-color: #333;
            --accent-gradient: linear-gradient(135deg, #0c19dd, #4c54c4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-gradient);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            margin: 0 auto 1rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 300;
        }

        .login-title {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            text-align: center;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: #0c19dd;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .alert-error {
            background-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .alert-success {
            background-color: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon"></div>
            <div class="logo-text">PRIMEBOOKS</div>
        </div>

        <h1 class="login-title">Analytics Dashboard</h1>
        <p class="login-subtitle">Sign in to access analytics</p>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_username" class="form-label">Username</label>
                <input
                    type="text"
                    name="username"
                    id="id_username"
                    class="form-control"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="id_password" class="form-label">Password</label>
                <input
                    type="password"
                    name="password"
                    id="id_password"
                    class="form-control"
                    required
                >
            </div>

            <button type="submit" class="btn-login">
                Sign In
            </button>
        </form>
    </div>
</body>
</html>
