{% load i18n %}
{% load humanize %}
{% load expense_tags %}

<div class="card border-0 shadow-sm mb-3 expense-card">
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-start mb-2">
            <h6 class="mb-1">
                <a href="{% url 'expenses:expense_detail' expense.pk %}" class="text-decoration-none">
                    {{ expense.expense_number }}
                </a>
            </h6>
            {% expense_status_badge expense %}
        </div>

        <p class="mb-2">{{ expense.title|truncatewords:10 }}</p>

        <div class="d-flex justify-content-between align-items-center">
            <small class="text-muted">
                <i class="bi bi-calendar3 me-1"></i>
                {{ expense.expense_date|date:"M d, Y" }}
            </small>
            <span class="fw-bold text-primary">
                {{ expense.amount|currency_format:expense.currency }}
            </span>
        </div>

        <div class="mt-2">
            <span class="badge" style="background-color: {{ expense.category|get_category_color }};">
                {{ expense.category.name }}
            </span>
        </div>
    </div>
</div>
