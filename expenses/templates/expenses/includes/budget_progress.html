{% load expense_tags %}

<div class="budget-progress mb-3">
    <div class="d-flex justify-content-between mb-1">
        <span class="fw-medium">{{ category.name }}</span>
        <span>
            {{ spent|floatformat:0 }} / {{ budget|floatformat:0 }}
            <span class="badge bg-{{ utilization|budget_status_class }} ms-1">
                {{ utilization|floatformat:1 }}%
            </span>
        </span>
    </div>
    <div class="progress" style="height: 8px;">
        <div class="progress-bar bg-{{ utilization|budget_status_class }}"
             role="progressbar"
             style="width: {{ utilization }}%"
             aria-valuenow="{{ utilization }}"
             aria-valuemin="0"
             aria-valuemax="100">
        </div>
    </div>
</div>
