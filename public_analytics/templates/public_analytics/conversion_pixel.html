<script>
(function() {
    // Track conversion
    fetch('/analytics/conversion/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            conversion_type: '{{ conversion_type }}',
            {% if conversion_value %}conversion_value: {{ conversion_value }},{% endif %}
            url_path: window.location.pathname
        })
    });
})();
</script>
